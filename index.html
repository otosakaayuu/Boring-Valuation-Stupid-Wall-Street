    const pts = sweep(50,1500,60,rc=>v.mvf/rc);
    return {
      big:fmtNum(q,2),bigUnit:'',bigLabel:"Tobin's Q",
      subs:[{l:'Market Value',v:'$'+fmtNum(v.mvf,1)+'M'},{l:'Replacement Cost',v:'$'+fmtNum(v.repcost,1)+'M'}],
      note:{type: q>2?'warn':q<1?'info':'good', text: q>2?'Q>2: pasar menilai perusahaan jauh di atas biaya replacement aset fisiknya — biasanya mengindikasikan intangible value besar (brand, paten, network effect) ATAU potensi overvaluation jika tidak didukung fundamental jelas.':q<1?'Q<1: secara teori, lebih murah membeli SAHAM perusahaan ini daripada membangun ulang asetnya dari nol — sinyal klasik bahwa perusahaan mungkin undervalued atau sedang menghadapi prospek industri yang lemah.':'Tobin\'s Q mendekati 1 — nilai pasar perusahaan relatif konsisten dengan biaya replacement asetnya.'},
      chart:{xMin:50,xMax:1500,yMin:0,yMax:Math.max(...pts.map(p=>p.y))*1.1,vline:v.repcost,hlines:[{y:1,color:COLORS.green,dash:true}],series:[{label:"Tobin's Q vs Replacement Cost",color:COLORS.cyan,pts}]}
    };
  }
},
{
  id:'ddm2stage',ch:2,year:1962,who:'Modigliani & Miller (perluasan model dividen)',name:'Two-Stage Dividend Discount Model',
  desc:'Memperluas Gordon Growth Model untuk perusahaan yang sedang mengalami fase HIGH GROWTH sementara, sebelum akhirnya "matang" ke growth rate stabil jangka panjang — lebih realistis dibanding asumsi growth konstan selamanya.',
  tex:'P_0=\\sum_{t=1}^{n}\\frac{D_t}{(1+r)^t}+\\frac{D_n(1+g_{stable})}{(r-g_{stable})(1+r)^n}',
  vars:[
    {k:'d0',label:'Dividen Saat Ini (D₀)',min:0.5,max:10,step:0.1,def:2,unit:'$'},
    {k:'ghigh',label:'Growth Rate Fase Tinggi (5 thn)',min:5,max:30,step:0.5,def:15,unit:'%'},
    {k:'gstable',label:'Growth Rate Stabil (terminal)',min:1,max:8,step:0.25,def:4,unit:'%'},
    {k:'rreq',label:'Required Return (r)',min:6,max:20,step:0.25,def:11,unit:'%'}
  ],
  calc(v){
    const n=5;
    let pvHigh=0, d=v.d0, lastD=0;
    for(let t=1;t<=n;t++){
      d = d*(1+v.ghigh/100);
      pvHigh += d/Math.pow(1+v.rreq/100,t);
      lastD = d;
    }
    const dTerminal = lastD*(1+v.gstable/100);
    const termVal = dTerminal/((v.rreq-v.gstable)/100);
    const pvTerm = termVal/Math.pow(1+v.rreq/100,n);
    const price = pvHigh+pvTerm;
    const pts = sweep(6,20,60,r=>{
      let pv=0,dd=v.d0,last=0;
      for(let t=1;t<=n;t++){ dd=dd*(1+v.ghigh/100); pv+=dd/Math.pow(1+r/100,t); last=dd; }
      const dt=last*(1+v.gstable/100);
      const tv = (r-v.gstable)>0.5? dt/((r-v.gstable)/100) : null;
      return tv!==null? pv+tv/Math.pow(1+r/100,n) : null;
    }).filter(p=>p.y!==null && p.y<1000);
    return {
      big:fmtNum(price,2),bigUnit:'',bigLabel:'Harga Wajar Saham (P₀)',
      subs:[{l:'PV Fase High-Growth',v:'$'+fmtNum(pvHigh,2)},{l:'PV Terminal Value',v:'$'+fmtNum(pvTerm,2)},{l:'% dari Terminal Value',v:fmtNum(pvTerm/price*100,1)+'%'}],
      note:{type: v.ghigh>v.rreq?'danger':pvTerm/price>0.7?'warn':'good', text: v.ghigh>v.rreq?'Growth rate fase tinggi MELEBIHI required return — secara matematis model masih valid untuk periode terbatas, tapi pastikan asumsi ini realistis untuk jangka pendek saja, tidak bisa bertahan selamanya.':pvTerm/price>0.7?'Mayoritas nilai (>70%) berasal dari terminal value pada fase stabil — valuasi sangat bergantung pada asumsi growth jangka panjang yang sulit diverifikasi.':'Kombinasi growth fase tinggi dan stabil menghasilkan distribusi nilai yang seimbang antara dividen jangka pendek dan terminal value.'},
      chart:{xMin:6,xMax:20,yMin:0,yMax:Math.max(...pts.map(p=>p.y))*1.15,vline:v.rreq,series:[{label:'Harga Saham vs Required Return',color:COLORS.amber,pts}]}
    };
  }
},
{
  id:'fcfe',ch:2,year:1986,who:'Alfred Rappaport (Shareholder Value Analysis)',name:'Free Cash Flow to Equity (FCFE)',
  desc:'Mengukur cash flow yang TERSEDIA bagi pemegang saham SETELAH semua obligasi ke kreditur (bunga, pelunasan utang) dipenuhi — berbeda dari FCFF yang mengukur cash flow untuk SEMUA penyedia modal (termasuk kreditur).',
  tex:'FCFE=NI+\\text{Dep}-\\text{CapEx}-\\Delta NWC+\\text{Net Borrowing}',
  vars:[
    {k:'ni3',label:'Net Income',min:20,max:400,step:5,def:100,unit:'$M'},
    {k:'dep',label:'Depreciation & Amortization',min:5,max:150,step:5,def:40,unit:'$M'},
    {k:'capex',label:'Capital Expenditure',min:5,max:200,step:5,def:60,unit:'$M'},
    {k:'nwcchg',label:'Δ Net Working Capital',min:-50,max:80,step:5,def:10,unit:'$M'},
    {k:'netborrow',label:'Net Borrowing (utang baru - pelunasan)',min:-100,max:150,step:5,def:20,unit:'$M'}
  ],
  calc(v){
    const fcfe = v.ni3+v.dep-v.capex-v.nwcchg+v.netborrow;
    const pts = sweep(-100,150,60,nb=>v.ni3+v.dep-v.capex-v.nwcchg+nb);
    return {
      big:fmtNum(fcfe,2),bigUnit:'$M',bigLabel:'Free Cash Flow to Equity',
      subs:[{l:'Net Income',v:'$'+fmtNum(v.ni3,1)+'M'},{l:'Capex - Depreciation',v:'$'+fmtNum(v.capex-v.dep,1)+'M'},{l:'Net Borrowing',v:'$'+fmtNum(v.netborrow,1)+'M'}],
      note:{type: fcfe<0?'danger':fcfe<v.ni3*0.3?'warn':'good', text: fcfe<0?'FCFE NEGATIF: perusahaan tidak menghasilkan cash flow yang cukup untuk pemegang saham SETELAH capex dan kewajiban utang — kemungkinan butuh pendanaan eksternal tambahan atau capex sedang dalam fase ekspansi besar.':fcfe<v.ni3*0.3?'FCFE jauh lebih kecil dari Net Income: porsi besar laba "terkunci" di capex atau pembayaran utang — kualitas cash conversion dari laba bersih relatif rendah.':'FCFE solid relatif terhadap Net Income — perusahaan menghasilkan cash riil yang bisa didistribusikan ke pemegang saham (dividen/buyback) tanpa mengorbankan investasi.'},
      chart:{xMin:-100,xMax:150,yMin:Math.min(...pts.map(p=>p.y))-10,yMax:Math.max(...pts.map(p=>p.y))+10,vline:v.netborrow,hlines:[{y:0,color:COLORS.faint,dash:true}],series:[{label:'FCFE vs Net Borrowing',color:COLORS.cyan,pts}]}
    };
  }
}
]);

/* ===================== BAB 3: CREDIT & FIXED INCOME ANALYSIS (11) ===================== */
addF([
{
  id:'bondprice',ch:3,year:1938,who:'Frederick Macaulay (formalisasi)',name:'Bond Pricing (Present Value of Cash Flows)',
  desc:'Harga obligasi adalah PRESENT VALUE dari seluruh kupon masa depan PLUS nilai pokok (face value) saat maturity — fondasi seluruh fixed income analysis. Harga bergerak BERLAWANAN arah dengan yield (YTM).',
  tex:'P=\\sum_{t=1}^{n}\\frac{C}{(1+y)^t}+\\frac{F}{(1+y)^n}',
  vars:[
    {k:'facevalue',label:'Face Value',min:500,max:5000,step:100,def:1000,unit:'$'},
    {k:'couponrate',label:'Coupon Rate',min:0,max:12,step:0.25,def:6,unit:'%'},
    {k:'ytm',label:'Yield to Maturity (YTM)',min:0.5,max:15,step:0.25,def:5,unit:'%'},
    {k:'years',label:'Maturity',min:1,max:30,step:1,def:10,unit:' thn'}
  ],
  calc(v){
    const coupon = v.facevalue*v.couponrate/100;
    let price=0;
    for(let t=1;t<=v.years;t++){ price += coupon/Math.pow(1+v.ytm/100,t); }
    price += v.facevalue/Math.pow(1+v.ytm/100,v.years);
    const premium = price-v.facevalue;
    const pts = sweep(0.5,15,60,y=>{
      let p=0;
      for(let t=1;t<=v.years;t++){ p+=coupon/Math.pow(1+y/100,t); }
      return p+v.facevalue/Math.pow(1+y/100,v.years);
    });
    return {
      big:fmtNum(price,2),bigUnit:'',bigLabel:'Harga Obligasi',
      subs:[{l:'Premium/Discount vs Par',v:(premium>=0?'+':'')+fmtNum(premium,2)},{l:'Status',v: premium>1?'Premium Bond':premium<-1?'Discount Bond':'Mendekati Par'}],
      note:{type: v.ytm>v.couponrate?'warn':'info', text: v.ytm>v.couponrate?'YTM > Coupon Rate: obligasi diperdagangkan di DISCOUNT (harga<par) — investor menuntut yield lebih tinggi dari kupon nominal, biasanya karena suku bunga pasar naik sejak penerbitan.':v.ytm<v.couponrate?'YTM < Coupon Rate: obligasi diperdagangkan di PREMIUM (harga>par) — kupon nominal lebih atraktif dari yield pasar saat ini.':'Harga mendekati par value — YTM hampir sama dengan coupon rate.'},
      chart:{xMin:0.5,xMax:15,yMin:Math.min(...pts.map(p=>p.y))*0.9,yMax:Math.max(...pts.map(p=>p.y))*1.1,vline:v.ytm,hlines:[{y:v.facevalue,color:COLORS.faint,dash:true}],series:[{label:'Harga Obligasi vs YTM (konveksitas harga-yield)',color:COLORS.amber,pts}]}
    };
  }
},
{
  id:'macaulayduration',ch:3,year:1938,who:'Frederick Macaulay',name:'Macaulay & Modified Duration',
  desc:'Macaulay Duration mengukur rata-rata waktu (tertimbang PV cash flow) sampai investor menerima kembali modalnya. Modified Duration mengubahnya menjadi ESTIMASI sensitivitas harga obligasi terhadap perubahan yield 1%.',
  tex:'D_{mod}=\\frac{D_{mac}}{1+y/k},\\quad \\%\\Delta P \\approx -D_{mod}\\times\\Delta y',
  vars:[
    {k:'fv2',label:'Face Value',min:500,max:5000,step:100,def:1000,unit:'$'},
    {k:'cr2',label:'Coupon Rate',min:0,max:12,step:0.25,def:6,unit:'%'},
    {k:'ytm2',label:'Yield to Maturity',min:0.5,max:15,step:0.25,def:5,unit:'%'},
    {k:'years2',label:'Maturity',min:1,max:30,step:1,def:10,unit:' thn'}
  ],
  calc(v){
    const coupon = v.fv2*v.cr2/100;
    let price=0, weightedT=0;
    for(let t=1;t<=v.years2;t++){
      const pv = coupon/Math.pow(1+v.ytm2/100,t);
      price += pv; weightedT += t*pv;
    }
    const pvFace = v.fv2/Math.pow(1+v.ytm2/100,v.years2);
    price += pvFace; weightedT += v.years2*pvFace;
    const macDur = weightedT/price;
    const modDur = macDur/(1+v.ytm2/100);
    const priceChange1pct = -modDur*1;
    const pts = sweep(1,30,60,yrs=>{
      let p=0,wt=0;
      for(let t=1;t<=yrs;t++){ const pv=coupon/Math.pow(1+v.ytm2/100,t); p+=pv; wt+=t*pv; }
      const pf = v.fv2/Math.pow(1+v.ytm2/100,yrs);
      p+=pf; wt+=yrs*pf;
      return (wt/p)/(1+v.ytm2/100);
    });
    return {
      big:fmtNum(modDur,2),bigUnit:' thn',bigLabel:'Modified Duration',
      subs:[{l:'Macaulay Duration',v:fmtNum(macDur,2)+' thn'},{l:'Estimasi Δ Harga jika yield +1%',v:fmtNum(priceChange1pct,2)+'%'}],
      note:{type: modDur>12?'warn':'info', text: modDur>12?'Modified Duration tinggi (>12 tahun): obligasi ini SANGAT sensitif terhadap perubahan suku bunga — kenaikan yield 1% bisa menurunkan harga lebih dari 12%. Cocok untuk trader yang punya pandangan kuat tentang arah suku bunga, berisiko untuk investor konservatif.':'Duration moderat — sensitivitas harga terhadap perubahan yield berada di rentang yang lebih terkelola untuk portfolio fixed income tipikal.'},
      chart:{xMin:1,xMax:30,yMin:0,yMax:Math.max(...pts.map(p=>p.y))*1.1,vline:v.years2,series:[{label:'Modified Duration vs Maturity',color:COLORS.cyan,pts}]}
    };
  }
},
{
  id:'ytmiterative',ch:3,year:1900,who:'Praktik Fixed Income (solusi numerik)',name:'Yield to Maturity (Implied dari Harga Pasar)',
  desc:'YTM adalah discount rate TUNGGAL yang membuat present value seluruh cash flow obligasi SAMA dengan harga pasarnya saat ini — tidak ada solusi closed-form, harus diselesaikan secara numerik/iteratif.',
  tex:'P_{market}=\\sum_{t=1}^{n}\\frac{C}{(1+YTM)^t}+\\frac{F}{(1+YTM)^n}',
  vars:[
    {k:'marketprice',label:'Harga Pasar Obligasi',min:600,max:1400,step:10,def:950,unit:'$'},
    {k:'fv3',label:'Face Value',min:500,max:2000,step:50,def:1000,unit:'$'},
    {k:'cr3',label:'Coupon Rate',min:0,max:12,step:0.25,def:6,unit:'%'},
    {k:'years3',label:'Maturity',min:1,max:30,step:1,def:10,unit:' thn'}
  ],
  calc(v){
    const coupon = v.fv3*v.cr3/100;
    function priceAt(y){
      let p=0;
      for(let t=1;t<=v.years3;t++){ p+=coupon/Math.pow(1+y,t); }
      return p+v.fv3/Math.pow(1+y,v.years3);
    }
    // bisection search for YTM
    let lo=0.0001, hi=0.5;
    for(let i=0;i<80;i++){
      const mid=(lo+hi)/2;
      if(priceAt(mid)>v.marketprice) lo=mid; else hi=mid;
    }
    const ytmFound = (lo+hi)/2*100;
    const currentYield = coupon/v.marketprice*100;
    const pts = sweep(600,1400,60,price=>{
      let l=0.0001,h=0.5;
      for(let i=0;i<60;i++){ const m=(l+h)/2; if(priceAt(m)>price) l=m; else h=m; }
      return (l+h)/2*100;
    });
    return {
      big:fmtNum(ytmFound,3),bigUnit:'%',bigLabel:'Yield to Maturity (Implied)',
      subs:[{l:'Current Yield (Coupon/Price)',v:fmtNum(currentYield,3)+'%'},{l:'Coupon Rate',v:fmtNum(v.cr3,2)+'%'}],
      note:{type: v.marketprice<v.fv3?'info':'warn', text: v.marketprice<v.fv3?'Obligasi diperdagangkan DI BAWAH par — YTM yang dihasilkan LEBIH BESAR dari coupon rate, mencerminkan capital gain implisit jika dipegang sampai maturity.':'Obligasi diperdagangkan DI ATAS par — YTM yang dihasilkan LEBIH KECIL dari coupon rate, karena ada "capital loss" implisit yang harus diperhitungkan sampai maturity.'},
      chart:{xMin:600,xMax:1400,yMin:0,yMax:Math.max(...pts.map(p=>p.y))*1.1,vline:v.marketprice,series:[{label:'YTM Implied vs Harga Pasar',color:COLORS.violet,pts}]}
    };
  }
},
{
  id:'debttoequity',ch:3,year:1900,who:'Praktik Credit Analysis Klasik',name:'Debt-to-Equity Ratio',
  desc:'Mengukur proporsi pendanaan perusahaan dari UTANG dibanding EKUITAS — metrik leverage paling fundamental yang dipakai credit analyst untuk menilai risiko struktur modal sebelum melihat rasio yang lebih kompleks.',
  tex:'D/E=\\frac{\\text{Total Debt}}{\\text{Total Equity}}',
  vars:[
    {k:'totaldebt',label:'Total Debt',min:0,max:1500,step:25,def:600,unit:'$M'},
    {k:'totalequity2',label:'Total Equity',min:50,max:1500,step:25,def:400,unit:'$M'}
  ],
  calc(v){
    const de = v.totaldebt/v.totalequity2;
    const debtRatio = v.totaldebt/(v.totaldebt+v.totalequity2)*100;
    const pts = sweep(0,1500,60,d=>d/v.totalequity2);
    return {
      big:fmtNum(de,2),bigUnit:'x',bigLabel:'Debt-to-Equity Ratio',
      subs:[{l:'Debt Ratio (Debt/Total Capital)',v:fmtNum(debtRatio,1)+'%'},{l:'Total Debt',v:'$'+fmtNum(v.totaldebt,0)+'M'}],
      note:{type: de>2?'warn':de<0.3?'info':'good', text: de>2?'D/E >2x: struktur modal SANGAT bergantung pada utang — risiko finansial tinggi, terutama jika cash flow operasional volatile atau suku bunga naik.':de<0.3?'D/E rendah (<0.3x): perusahaan sangat konservatif dalam memakai leverage — bisa jadi tidak optimal memanfaatkan tax shield dari utang, tapi risiko finansial sangat rendah.':'D/E berada di rentang moderat yang umum ditemukan di kebanyakan industri non-finansial yang sehat.'},
      chart:{xMin:0,xMax:1500,yMin:0,yMax:Math.max(...pts.map(p=>p.y))*1.1,vline:v.totaldebt,hlines:[{y:1,color:COLORS.faint,dash:true},{y:2,color:COLORS.red,dash:true}],series:[{label:'D/E Ratio vs Total Debt',color:COLORS.red,pts}]}
    };
  }
},
{
  id:'dscr',ch:3,year:1980,who:'Praktik Commercial Lending',name:'Debt Service Coverage Ratio (DSCR)',
  desc:'Metrik standar yang dipakai BANK dan lender komersial untuk menilai apakah cash flow operasional perusahaan/proyek cukup untuk menutupi seluruh obligasi pembayaran utang (pokok + bunga) periode tersebut.',
  tex:'DSCR=\\frac{\\text{Net Operating Income}}{\\text{Total Debt Service}}',
  vars:[
    {k:'noi',label:'Net Operating Income',min:20,max:500,step:5,def:200,unit:'$M'},
    {k:'debtservice',label:'Total Debt Service (pokok+bunga)',min:10,max:300,step:5,def:80,unit:'$M'}
  ],
  calc(v){
    const dscr = v.noi/v.debtservice;
    const pts = sweep(10,300,60,ds=>v.noi/ds);
    return {
      big:fmtNum(dscr,2),bigUnit:'x',bigLabel:'Debt Service Coverage Ratio',
      subs:[{l:'Net Operating Income',v:'$'+fmtNum(v.noi,1)+'M'},{l:'Total Debt Service',v:'$'+fmtNum(v.debtservice,1)+'M'}],
      note:{type: dscr<1?'danger':dscr<1.25?'warn':'good', text: dscr<1?'DSCR <1: cash flow operasional TIDAK CUKUP menutupi obligasi utang periode ini — kondisi default risk akut, lender biasanya menolak pinjaman baru pada level ini.':dscr<1.25?'DSCR di rentang minimum yang biasa disyaratkan lender (1.0-1.25x) — buffer terbatas, sensitif terhadap penurunan NOI sekecil apapun.':'DSCR sehat (>1.25x) — memenuhi syarat covenant tipikal kebanyakan commercial loan agreement dengan buffer yang wajar.'},
      chart:{xMin:10,xMax:300,yMin:0,yMax:Math.max(...pts.map(p=>p.y))*1.1,vline:v.debtservice,hlines:[{y:1,color:COLORS.red,dash:true},{y:1.25,color:COLORS.amber,dash:true}],series:[{label:'DSCR vs Total Debt Service',color:COLORS.green,pts}]}
    };
  }
},
{
  id:'ltv',ch:3,year:1930,who:'Praktik Perbankan (Mortgage Lending)',name:'Loan-to-Value (LTV) Ratio',
  desc:'Mengukur proporsi nilai aset (biasanya properti) yang didanai dari pinjaman — metrik risiko fundamental di lending berbasis collateral, semakin tinggi LTV semakin kecil "equity cushion" yang melindungi lender jika terjadi default.',
  tex:'LTV=\\frac{\\text{Loan Amount}}{\\text{Appraised Asset Value}}',
  vars:[
    {k:'loanamt',label:'Loan Amount',min:50,max:1000,step:10,def:400,unit:'$K'},
    {k:'assetval',label:'Appraised Asset Value',min:60,max:1200,step:10,def:500,unit:'$K'}
  ],
  calc(v){
    const ltv = v.loanamt/v.assetval*100;
    const equityCushion = 100-ltv;
    const pts = sweep(60,1200,60,av=>v.loanamt/av*100);
    return {
      big:fmtNum(ltv,2),bigUnit:'%',bigLabel:'Loan-to-Value Ratio',
      subs:[{l:'Equity Cushion',v:fmtNum(equityCushion,1)+'%'},{l:'Loan Amount',v:'$'+fmtNum(v.loanamt,0)+'K'}],
      note:{type: ltv>90?'danger':ltv>80?'warn':'good', text: ltv>90?'LTV >90%: equity cushion sangat tipis (<10%) — penurunan kecil pada nilai aset bisa membuat lender berada dalam posisi "underwater" jika harus melikuidasi collateral.':ltv>80?'LTV di rentang 80-90%: lender umumnya akan mensyaratkan private mortgage insurance (PMI) atau premi risiko tambahan pada level ini.':'LTV sehat (<80%): equity cushion cukup besar untuk melindungi lender dari fluktuasi nilai aset yang moderat.'},
      chart:{xMin:60,xMax:1200,yMin:0,yMax:Math.max(...pts.map(p=>p.y))*1.1,vline:v.assetval,hlines:[{y:80,color:COLORS.amber,dash:true},{y:90,color:COLORS.red,dash:true}],series:[{label:'LTV vs Appraised Value',color:COLORS.cyan,pts}]}
    };
  }
},
{
  id:'creditspread',ch:3,year:1970,who:'Praktik Fixed Income Trading',name:'Credit Spread (Yield Spread)',
  desc:'Selisih yield antara obligasi korporat dan obligasi pemerintah (risk-free) dengan maturity sama — mengukur PREMI RISIKO KREDIT yang dituntut investor untuk menanggung risiko default issuer korporat.',
  tex:'\\text{Spread}=Y_{corp}-Y_{treasury}',
  vars:[
    {k:'corpyield',label:'Corporate Bond Yield',min:2,max:15,step:0.1,def:6.5,unit:'%'},
    {k:'treasuryyield',label:'Treasury (Risk-Free) Yield',min:0.5,max:8,step:0.1,def:4,unit:'%'}
  ],
  calc(v){
    const spreadPct = v.corpyield-v.treasuryyield;
    const spreadBps = spreadPct*100;
    const pts = sweep(0.5,8,60,ty=>(v.corpyield-ty)*100);
    return {
      big:fmtNum(spreadBps,0),bigUnit:' bps',bigLabel:'Credit Spread',
      subs:[{l:'Dalam Persentase',v:fmtNum(spreadPct,2)+'%'},{l:'Corporate Yield',v:fmtNum(v.corpyield,2)+'%'}],
      note:{type: spreadBps>400?'danger':spreadBps>200?'warn':'good', text: spreadBps>400?'Spread sangat lebar (>400bps): pasar memberi sinyal risiko kredit TINGGI pada issuer ini — biasanya terlihat pada obligasi high-yield/junk atau saat kondisi makro penuh stres (credit crunch).':spreadBps>200?'Spread moderat-tinggi (200-400bps): konsisten dengan obligasi investment-grade bawah hingga crossover ke high-yield — perlu analisis kredit lebih dalam.':'Spread relatif sempit (<200bps): konsisten dengan obligasi investment-grade berkualitas baik, pasar menilai risiko default rendah.'},
      chart:{xMin:0.5,xMax:8,yMin:0,yMax:Math.max(...pts.map(p=>p.y))*1.1,vline:v.treasuryyield,hlines:[{y:200,color:COLORS.amber,dash:true},{y:400,color:COLORS.red,dash:true}],series:[{label:'Credit Spread vs Treasury Yield',color:COLORS.violet,pts}]}
    };
  }
},
{
  id:'convexity',ch:3,year:1984,who:'Stanley Diller (formalisasi akademik)',name:'Bond Convexity (Konsep Koreksi Duration)',
  desc:'Duration adalah aproksimasi LINEAR dari hubungan harga-yield obligasi, tapi hubungan sebenarnya CEMBUNG (convex) — convexity mengkoreksi estimasi duration agar lebih akurat, terutama untuk perubahan yield yang besar.',
  tex:'\\%\\Delta P \\approx -D_{mod}\\Delta y+\\frac{1}{2}\\times \\text{Convexity}\\times(\\Delta y)^2',
  vars:[
    {k:'moddur2',label:'Modified Duration',min:1,max:20,step:0.5,def:7,unit:' thn'},
    {k:'convexity2',label:'Convexity',min:10,max:300,step:5,def:80,unit:''},
    {k:'yieldchange',label:'Perubahan Yield (Δy)',min:-3,max:3,step:0.1,def:1,unit:'%'}
  ],
  calc(v){
    const dy = v.yieldchange/100;
    const durationEffect = -v.moddur2*dy*100;
    const convexityEffect = 0.5*v.convexity2*dy*dy*100;
    const totalEffect = durationEffect+convexityEffect;
    const linearOnly = durationEffect;
    const pts = sweep(-3,3,60,yc=>{
      const d=yc/100;
      return (-v.moddur2*d*100)+(0.5*v.convexity2*d*d*100);
    });
    return {
      big: (totalEffect>=0?'+':'')+fmtNum(totalEffect,3),bigUnit:'%',bigLabel:'Estimasi Δ Harga (Duration + Convexity)',
      subs:[{l:'Efek Duration Saja (Linear)',v:(durationEffect>=0?'+':'')+fmtNum(durationEffect,3)+'%'},{l:'Koreksi Convexity',v:'+'+fmtNum(convexityEffect,3)+'%'}],
      note:{type: Math.abs(v.yieldchange)>2?'warn':'info', text: Math.abs(v.yieldchange)>2?'Perubahan yield besar (>2%): pada level ini, estimasi DURATION SAJA (linear) menjadi tidak akurat — koreksi convexity menjadi material dan PENTING untuk diperhitungkan, terutama untuk obligasi dengan convexity tinggi.':'Koreksi convexity selalu POSITIF terhadap estimasi harga (bond convexity selalu menguntungkan holder) — meski untuk perubahan yield kecil, efeknya minor dibanding efek duration linear.'},
      chart:{xMin:-3,xMax:3,yMin:Math.min(...pts.map(p=>p.y))-3,yMax:Math.max(...pts.map(p=>p.y))+3,vline:v.yieldchange,hlines:[{y:0,color:COLORS.faint,dash:true}],series:[{label:'Δ Harga vs Δ Yield (kurva convex)',color:COLORS.amber,pts}]}
    };
  }
},
{
  id:'currentyield',ch:3,year:1900,who:'Praktik Fixed Income Dasar',name:'Current Yield vs Yield to Maturity',
  desc:'Current Yield adalah metrik SEDERHANA (kupon tahunan dibagi harga pasar saat ini) — TIDAK memperhitungkan capital gain/loss sampai maturity seperti YTM, sehingga sering menyesatkan jika dipakai sendirian untuk membandingkan obligasi.',
  tex:'\\text{Current Yield}=\\frac{\\text{Annual Coupon}}{\\text{Market Price}}',
  vars:[
    {k:'fv4',label:'Face Value',min:500,max:2000,step:50,def:1000,unit:'$'},
    {k:'cr4',label:'Coupon Rate',min:0,max:12,step:0.25,def:7,unit:'%'},
    {k:'mktprice2',label:'Harga Pasar',min:600,max:1400,step:10,def:900,unit:'$'}
  ],
  calc(v){
    const annualCoupon = v.fv4*v.cr4/100;
    const currentYield = annualCoupon/v.mktprice2*100;
    const impliedCapGain = (v.fv4-v.mktprice2)/v.mktprice2*100;
    const pts = sweep(600,1400,60,p=>annualCoupon/p*100);
    return {
      big:fmtNum(currentYield,3),bigUnit:'%',bigLabel:'Current Yield',
      subs:[{l:'Annual Coupon',v:'$'+fmtNum(annualCoupon,2)},{l:'Implied Capital Gain ke Par',v:(impliedCapGain>=0?'+':'')+fmtNum(impliedCapGain,2)+'%'}],
      note:{type: Math.abs(impliedCapGain)>10?'warn':'info', text: Math.abs(impliedCapGain)>10?'Selisih harga pasar dengan par CUKUP BESAR (>10%): Current Yield akan SANGAT MENYESATKAN sebagai estimasi return total — gunakan YTM yang memperhitungkan capital gain/loss menuju par saat maturity.':'Current Yield relatif representatif karena harga pasar tidak terlalu jauh dari par — tapi tetap, YTM adalah metrik yang lebih lengkap dan akurat untuk perbandingan antar obligasi.'},
      chart:{xMin:600,xMax:1400,yMin:0,yMax:Math.max(...pts.map(p=>p.y))*1.1,vline:v.mktprice2,hlines:[{y:v.cr4,color:COLORS.faint,dash:true}],series:[{label:'Current Yield vs Harga Pasar',color:COLORS.cyan,pts}]}
    };
  }
},
{
  id:'zspread',ch:3,year:1990,who:'Praktik Structured Finance',name:'Z-Spread (Zero-Volatility Spread)',
  desc:'Spread konstan yang ditambahkan ke SETIAP titik di yield curve risk-free (bukan cuma satu titik seperti nominal spread) sehingga PV cash flow obligasi sama dengan harga pasarnya — lebih akurat dari nominal spread sederhana untuk yield curve yang tidak flat.',
  tex:'P_{market}=\\sum_{t=1}^{n}\\frac{C_t}{(1+r_t+Z)^t}',
  vars:[
    {k:'nominalspread',label:'Nominal Spread (estimasi awal)',min:50,max:500,step:10,def:200,unit:' bps'},
    {k:'curvesteep',label:'Steepness Yield Curve',min:0,max:200,step:10,def:80,unit:' bps (10y-2y)'}
  ],
  calc(v){
    // Z-spread approximation: wider than nominal spread when curve is steep, due to averaging effect across maturities
    const zSpreadEstimate = v.nominalspread + (v.curvesteep*0.15);
    const pts = sweep(0,200,60,steep=>v.nominalspread+(steep*0.15));
    return {
      big:fmtNum(zSpreadEstimate,0),bigUnit:' bps',bigLabel:'Z-Spread (Estimasi)',
      subs:[{l:'Nominal Spread',v:fmtNum(v.nominalspread,0)+' bps'},{l:'Selisih Z-Spread vs Nominal',v:'+'+fmtNum(zSpreadEstimate-v.nominalspread,0)+' bps'}],
      note:{type: v.curvesteep>100?'warn':'info', text: v.curvesteep>100?'Yield curve cukup steep (>100bps antara 2yr-10yr): perbedaan antara Z-spread dan nominal spread menjadi MATERIAL — nominal spread sederhana akan understate risiko kredit sesungguhnya pada kondisi curve seperti ini.':'Yield curve relatif flat: Z-spread dan nominal spread cenderung tidak jauh berbeda, nominal spread sederhana masih cukup representatif sebagai estimasi cepat.'},
      chart:{xMin:0,xMax:200,yMin:v.nominalspread-10,yMax:Math.max(...pts.map(p=>p.y))+10,vline:v.curvesteep,series:[{label:'Z-Spread vs Curve Steepness',color:COLORS.violet,pts}]}
    };
  }
}
]);

/* ===================== BAB 4: CORPORATE FINANCE & CAPITAL STRUCTURE (11) ===================== */
addF([
{
  id:'wacc',ch:4,year:1958,who:'Franco Modigliani & Merton Miller',name:'Weighted Average Cost of Capital (WACC)',
  desc:'Rata-rata tertimbang biaya modal dari SEMUA sumber pendanaan perusahaan (ekuitas dan utang) — discount rate standar yang dipakai untuk menilai apakah sebuah proyek/investasi menciptakan nilai bagi seluruh penyedia modal.',
  tex:'WACC=\\frac{E}{V}R_e+\\frac{D}{V}R_d(1-T_c)',
  vars:[
    {k:'equityval',label:'Market Value of Equity (E)',min:100,max:2000,step:25,def:600,unit:'$M'},
    {k:'debtval',label:'Market Value of Debt (D)',min:0,max:1500,step:25,def:400,unit:'$M'},
    {k:'costequity',label:'Cost of Equity (Re)',min:4,max:25,step:0.25,def:12,unit:'%'},
    {k:'costdebt',label:'Cost of Debt (Rd, pre-tax)',min:1,max:15,step:0.25,def:6,unit:'%'},
    {k:'taxrate',label:'Tax Rate',min:0,max:40,step:1,def:25,unit:'%'}
  ],
  calc(v){
    const V = v.equityval+v.debtval;
    const weE = v.equityval/V, weD = v.debtval/V;
    const wacc = weE*v.costequity + weD*v.costdebt*(1-v.taxrate/100);
    const taxShield = weD*v.costdebt*(v.taxrate/100);
    const pts = sweep(0,1500,60,d=>{
      const v2=v.equityval+d;
      return (v.equityval/v2)*v.costequity + (d/v2)*v.costdebt*(1-v.taxrate/100);
    });
    return {
      big:fmtNum(wacc,3),bigUnit:'%',bigLabel:'WACC',
      subs:[{l:'Weight Equity',v:fmtNum(weE*100,1)+'%'},{l:'Weight Debt',v:fmtNum(weD*100,1)+'%'},{l:'Tax Shield Benefit',v:fmtNum(taxShield,3)+'pp'}],
      note:{type: weD>0.7?'warn':weD<0.1?'info':'good', text: weD>0.7?'Proporsi debt sangat tinggi (>70% dari total capital): WACC rendah karena tax shield, tapi risiko finansial dan kemungkinan financial distress meningkat tajam — trade-off klasik Modigliani-Miller dengan friksi pajak dan bankruptcy cost.':weD<0.1?'Proporsi debt sangat rendah (<10%): perusahaan tidak banyak memanfaatkan tax shield dari utang — WACC relatif lebih tinggi dibanding struktur modal yang lebih optimal secara teori.':'Struktur modal berada di rentang yang umum dianggap "sehat" oleh kebanyakan perusahaan non-finansial.'},
      chart:{xMin:0,xMax:1500,yMin:Math.min(...pts.map(p=>p.y))-1,yMax:Math.max(...pts.map(p=>p.y))+1,vline:v.debtval,series:[{label:'WACC vs Market Value of Debt',color:COLORS.amber,pts}]}
    };
  }
},
{
  id:'npv',ch:4,year:1907,who:'Irving Fisher',name:'Net Present Value (NPV)',
  desc:'Aturan keputusan investasi paling fundamental dalam corporate finance: terima proyek jika NPV positif (menciptakan nilai), tolak jika negatif — menjumlahkan SEMUA cash flow proyek yang di-discount ke present value.',
  tex:'NPV=\\sum_{t=0}^{n}\\frac{CF_t}{(1+r)^t}',
  vars:[
    {k:'initialinv',label:'Investasi Awal (CF₀)',min:200,max:3000,step:50,def:1000,unit:'$K'},
    {k:'annualcf',label:'Cash Flow Tahunan (rata-rata)',min:50,max:800,step:10,def:350,unit:'$K'},
    {k:'projyears',label:'Durasi Proyek',min:2,max:15,step:1,def:5,unit:' thn'},
    {k:'discrate',label:'Discount Rate',min:2,max:25,step:0.5,def:10,unit:'%'}
  ],
  calc(v){
    let npv = -v.initialinv;
    for(let t=1;t<=v.projyears;t++){ npv += v.annualcf/Math.pow(1+v.discrate/100,t); }
    const pts = sweep(2,25,60,r=>{
      let n=-v.initialinv;
      for(let t=1;t<=v.projyears;t++){ n+=v.annualcf/Math.pow(1+r/100,t); }
      return n;
    });
    return {
      big:(npv>=0?'+':'')+fmtNum(npv,1),bigUnit:'$K',bigLabel:'Net Present Value',
      subs:[{l:'Total Undiscounted CF',v:'$'+fmtNum(v.annualcf*v.projyears,0)+'K'},{l:'Initial Investment',v:'$'+fmtNum(v.initialinv,0)+'K'}],
      note:{type: npv<0?'danger':npv/v.initialinv<0.1?'warn':'good', text: npv<0?'NPV NEGATIF: proyek ini MENGHANCURKAN nilai pada discount rate ini — secara teori keuangan, proyek harus DITOLAK meski terlihat "untung" secara akuntansi kasar.':npv/v.initialinv<0.1?'NPV positif tapi margin keamanan tipis relatif terhadap initial investment — sensitif terhadap kesalahan estimasi cash flow atau discount rate.':'NPV solid positif — proyek menciptakan nilai signifikan relatif terhadap modal yang diinvestasikan, layak diterima.'},
      chart:{xMin:2,xMax:25,yMin:Math.min(...pts.map(p=>p.y))-50,yMax:Math.max(...pts.map(p=>p.y))+50,vline:v.discrate,hlines:[{y:0,color:COLORS.faint,dash:true}],series:[{label:'NPV vs Discount Rate',color:COLORS.green,pts}]}
    };
  }
},
{
  id:'irr',ch:4,year:1955,who:'Joel Dean (popularisasi korporat)',name:'Internal Rate of Return (IRR)',
  desc:'Discount rate yang membuat NPV proyek TEPAT NOL — secara intuitif, ini adalah "return rate" yang dihasilkan proyek itu sendiri. Aturan: terima proyek jika IRR > cost of capital (hurdle rate).',
  tex:'0=\\sum_{t=0}^{n}\\frac{CF_t}{(1+IRR)^t}',
  vars:[
    {k:'initialinv2',label:'Investasi Awal',min:200,max:3000,step:50,def:1000,unit:'$K'},
    {k:'annualcf2',label:'Cash Flow Tahunan',min:50,max:800,step:10,def:300,unit:'$K'},
    {k:'projyears2',label:'Durasi Proyek',min:2,max:15,step:1,def:5,unit:' thn'},
    {k:'hurdlerate',label:'Hurdle Rate (cost of capital)',min:2,max:25,step:0.5,def:10,unit:'%'}
  ],
  calc(v){
    function npvAt(r){
      let n=-v.initialinv2;
      for(let t=1;t<=v.projyears2;t++){ n+=v.annualcf2/Math.pow(1+r,t); }
      return n;
    }
    let lo=0.0001, hi=2;
    for(let i=0;i<80;i++){
      const mid=(lo+hi)/2;
      if(npvAt(mid)>0) lo=mid; else hi=mid;
    }
    const irr = (lo+hi)/2*100;
    const spread = irr-v.hurdlerate;
    const pts = sweep(50,800,60,cf=>{
      function npvAt2(r){ let n=-v.initialinv2; for(let t=1;t<=v.projyears2;t++){ n+=cf/Math.pow(1+r,t); } return n; }
      let l=0.0001,h=2;
      for(let i=0;i<60;i++){ const m=(l+h)/2; if(npvAt2(m)>0) l=m; else h=m; }
      return (l+h)/2*100;
    });
    return {
      big:fmtNum(irr,2),bigUnit:'%',bigLabel:'Internal Rate of Return',
      subs:[{l:'Hurdle Rate',v:fmtNum(v.hurdlerate,2)+'%'},{l:'IRR - Hurdle Rate',v:(spread>=0?'+':'')+fmtNum(spread,2)+'pp'}],
      note:{type: spread<0?'danger':spread<3?'warn':'good', text: spread<0?'IRR LEBIH RENDAH dari hurdle rate: proyek menghasilkan return di bawah biaya modal — secara teori harus DITOLAK, meski terlihat menarik dari sisi nominal cash flow.':spread<3?'IRR sedikit di atas hurdle rate: proyek layak diterima tapi margin keamanan tipis terhadap kesalahan estimasi.':'IRR jauh melampaui hurdle rate — proyek sangat menarik secara return, asalkan asumsi cash flow realistis.'},
      chart:{xMin:50,xMax:800,yMin:0,yMax:Math.max(...pts.map(p=>p.y))*1.1,vline:v.annualcf2,hlines:[{y:v.hurdlerate,color:COLORS.red,dash:true}],series:[{label:'IRR vs Annual Cash Flow',color:COLORS.cyan,pts}]}
    };
  }
},
{
  id:'paybackperiod',ch:4,year:1950,who:'Praktik Capital Budgeting Klasik',name:'Payback Period',
  desc:'Metrik SEDERHANA yang mengukur berapa lama waktu dibutuhkan untuk cash flow proyek menutupi kembali investasi awal — populer karena mudah dipahami, tapi TIDAK memperhitungkan time value of money atau cash flow setelah payback tercapai.',
  tex:'\\text{Payback}=\\text{Tahun terakhir CF negatif}+\\frac{|\\text{Sisa CF negatif}|}{\\text{CF tahun berikutnya}}',
  vars:[
    {k:'initialinv3',label:'Investasi Awal',min:200,max:3000,step:50,def:1000,unit:'$K'},
    {k:'annualcf3',label:'Cash Flow Tahunan (konstan)',min:50,max:800,step:10,def:300,unit:'$K'}
  ],
  calc(v){
    const payback = v.initialinv3/v.annualcf3;
    const pts = sweep(50,800,60,cf=>v.initialinv3/cf);
    return {
      big:fmtNum(payback,2),bigUnit:' thn',bigLabel:'Payback Period',
      subs:[{l:'Investasi Awal',v:'$'+fmtNum(v.initialinv3,0)+'K'},{l:'CF Tahunan',v:'$'+fmtNum(v.annualcf3,0)+'K'}],
      note:{type: payback>5?'warn':'info', text: payback>5?'Payback period panjang (>5 tahun): risiko ketidakpastian jangka panjang lebih besar, dan metrik ini SAMA SEKALI tidak memperhitungkan time value of money — gunakan NPV/IRR sebagai pelengkap analisis, jangan andalkan payback period sendirian.':'Ingat keterbatasan fundamental metrik ini: payback period mengabaikan SEMUA cash flow setelah titik payback tercapai, dan tidak men-discount cash flow — dua proyek dengan payback period sama bisa punya NPV yang sangat berbeda.'},
      chart:{xMin:50,xMax:800,yMin:0,yMax:Math.max(...pts.map(p=>p.y))*1.1,vline:v.annualcf3,series:[{label:'Payback Period vs Cash Flow Tahunan',color:COLORS.amber,pts}]}
    };
  }
},
{
  id:'breakeven',ch:4,year:1930,who:'Walter Rautenstrauch (cost-volume-profit analysis)',name:'Break-Even Point Analysis',
  desc:'Menghitung volume penjualan minimum yang dibutuhkan agar perusahaan/produk mencapai titik impas (profit=0) — fondasi cost-volume-profit (CVP) analysis yang dipakai untuk perencanaan operasional dan pricing.',
  tex:'Q_{BE}=\\frac{\\text{Fixed Costs}}{\\text{Price} - \\text{Variable Cost per Unit}}',
  vars:[
    {k:'fixedcosts2',label:'Fixed Costs',min:5000,max:200000,step:1000,def:50000,unit:'$'},
    {k:'priceunit',label:'Price per Unit',min:5,max:200,step:1,def:40,unit:'$'},
    {k:'varcostunit',label:'Variable Cost per Unit',min:1,max:150,step:1,def:25,unit:'$'}
  ],
  calc(v){
    const contributionMargin = v.priceunit-v.varcostunit;
    const breakevenUnits = v.fixedcosts2/contributionMargin;
    const breakevenRevenue = breakevenUnits*v.priceunit;
    const cmRatio = contributionMargin/v.priceunit*100;
    const pts = sweep(1,150,60,vc=>{ const cm=v.priceunit-vc; return cm>0.5? v.fixedcosts2/cm : null; }).filter(p=>p.y!==null && p.y<breakevenUnits*10);
    return {
      big:fmtNum(breakevenUnits,0),bigUnit:' unit',bigLabel:'Break-Even Quantity',
      subs:[{l:'Break-Even Revenue',v:'$'+fmtNum(breakevenRevenue,0)},{l:'Contribution Margin Ratio',v:fmtNum(cmRatio,1)+'%'}],
      note:{type: cmRatio<20?'warn':'good', text: cmRatio<20?'Contribution margin ratio rendah (<20%): perusahaan butuh VOLUME besar untuk menutupi fixed cost — model bisnis ini sangat sensitif terhadap fluktuasi volume penjualan.':'Contribution margin ratio sehat — setiap unit terjual memberikan kontribusi yang relatif besar untuk menutupi fixed cost dan menghasilkan profit setelah break-even tercapai.'},
      chart:{xMin:1,xMax:150,yMin:0,yMax:Math.max(...pts.map(p=>p.y))*1.1,vline:v.varcostunit,series:[{label:'Break-Even Units vs Variable Cost',color:COLORS.red,pts}]}
    };
  }
},
{
  id:'maaccretion',ch:4,year:1980,who:'Praktik M&A Investment Banking',name:'M&A EPS Accretion/Dilution',
  desc:'Menentukan apakah sebuah akuisisi akan MENAMBAH (accretive) atau MENGURANGI (dilutive) EPS perusahaan pengakuisisi — metrik krusial yang sering jadi headline pertimbangan dalam pengumuman M&A, meski tidak selalu mencerminkan value creation sesungguhnya.',
  tex:'\\%\\Delta EPS=\\frac{\\text{Pro Forma EPS}-\\text{Acquirer EPS}}{\\text{Acquirer EPS}}',
  vars:[
    {k:'acqeps',label:'Acquirer EPS (sebelum deal)',min:0.5,max:10,step:0.1,def:3,unit:'$'},
    {k:'acqshares',label:'Acquirer Shares Outstanding',min:20,max:500,step:5,def:100,unit:'M'},
    {k:'targetni',label:'Target Net Income',min:10,max:300,step:5,def:100,unit:'$M'},
    {k:'newsharesissued',label:'New Shares Issued untuk Deal',min:0,max:300,step:5,def:25,unit:'M'}
  ],
  calc(v){
    const acquirerNI = v.acqeps*v.acqshares;
    const combinedNI = acquirerNI+v.targetni;
    const totalShares = v.acqshares+v.newsharesissued;
    const proFormaEPS = combinedNI/totalShares;
    const accDil = (proFormaEPS-v.acqeps)/v.acqeps*100;
    const pts = sweep(0,300,60,ns=>{
      const ts=v.acqshares+ns;
      return ((combinedNI/ts)-v.acqeps)/v.acqeps*100;
    });
    return {
      big:(accDil>=0?'+':'')+fmtNum(accDil,2),bigUnit:'%',bigLabel:'EPS Accretion/(Dilution)',
      subs:[{l:'Pro Forma EPS',v:'$'+fmtNum(proFormaEPS,3)},{l:'Acquirer EPS (sebelum)',v:'$'+fmtNum(v.acqeps,2)},{l:'Status',v: accDil>=0?'ACCRETIVE':'DILUTIVE'}],
      note:{type: accDil<0?'warn':'good', text: accDil<0?'Deal ini DILUTIVE terhadap EPS — meski demikian, dilutive TIDAK SELALU berarti deal buruk secara value creation. Sinergi jangka panjang, strategic fit, atau growth target yang lebih tinggi bisa membenarkan dilusi EPS jangka pendek.':'Deal ini ACCRETIVE terhadap EPS — tapi tetap waspada: accretion bisa terjadi murni dari mekanika P/E arbitrage (membeli target dengan P/E lebih rendah), bukan dari sinergi operasional nyata.'},
      chart:{xMin:0,xMax:300,yMin:Math.min(...pts.map(p=>p.y))-2,yMax:Math.max(...pts.map(p=>p.y))+2,vline:v.newsharesissued,hlines:[{y:0,color:COLORS.faint,dash:true}],series:[{label:'EPS Accretion vs New Shares Issued',color:COLORS.violet,pts}]}
    };
  }
},
{
  id:'mmproptwo',ch:4,year:1963,who:'Modigliani & Miller (versi dengan pajak)',name:'Modigliani-Miller Proposition II (with Taxes)',
  desc:'Menunjukkan bagaimana cost of equity NAIK secara linear seiring leverage bertambah — karena risiko finansial yang ditanggung pemegang saham meningkat, meski WACC bisa menurun karena tax shield dari utang.',
  tex:'R_e=R_u+(R_u-R_d)(1-T_c)\\frac{D}{E}',
  vars:[
    {k:'ru',label:'Unlevered Cost of Equity (Rᵤ)',min:5,max:20,step:0.25,def:12,unit:'%'},
    {k:'rd2',label:'Cost of Debt (Rd)',min:1,max:12,step:0.25,def:6,unit:'%'},
    {k:'tc2',label:'Tax Rate',min:0,max:40,step:1,def:25,unit:'%'},
    {k:'detarget',label:'D/E Ratio',min:0,max:4,step:0.1,def:1.5,unit:'x'}
  ],
  calc(v){
    const reLevered = v.ru+(v.ru-v.rd2)*(1-v.tc2/100)*v.detarget;
    const riskPremium = reLevered-v.ru;
    const pts = sweep(0,4,60,de=>v.ru+(v.ru-v.rd2)*(1-v.tc2/100)*de);
    return {
      big:fmtNum(reLevered,2),bigUnit:'%',bigLabel:'Levered Cost of Equity',
      subs:[{l:'Unlevered Cost of Equity',v:fmtNum(v.ru,2)+'%'},{l:'Risk Premium dari Leverage',v:'+'+fmtNum(riskPremium,2)+'pp'}],
      note:{type: v.detarget>2.5?'warn':'info', text: v.detarget>2.5?'D/E target tinggi (>2.5x): cost of equity meningkat signifikan akibat financial risk premium — pemegang saham menuntut return lebih tinggi untuk menanggung volatility tambahan dari leverage besar.':'Hubungan linear antara D/E dan cost of equity ini adalah inti argumen MM Prop II — leverage TIDAK "gratis", trade-off antara tax shield (WACC turun) dan financial risk (cost of equity naik) harus selalu dipertimbangkan bersama.'},
      chart:{xMin:0,xMax:4,yMin:v.ru-1,yMax:Math.max(...pts.map(p=>p.y))+1,vline:v.detarget,hlines:[{y:v.ru,color:COLORS.faint,dash:true}],series:[{label:'Levered Cost of Equity vs D/E',color:COLORS.amber,pts}]}
    };
  }
},
{
  id:'dividendpayout',ch:4,year:1956,who:'John Lintner',name:'Dividend Payout Ratio & Retention Rate',
  desc:'Mengukur proporsi laba bersih yang didistribusikan sebagai dividen versus yang DITAHAN (retained) untuk reinvestasi — Lintner mengamati perusahaan cenderung menjaga payout ratio relatif stabil (dividend smoothing) meski earnings volatile.',
  tex:'\\text{Payout Ratio}=\\frac{\\text{Dividends}}{\\text{Net Income}},\\quad \\text{Retention}=1-\\text{Payout}',
  vars:[
    {k:'totaldividends',label:'Total Dividends Dibayarkan',min:0,max:300,step:5,def:60,unit:'$M'},
    {k:'netincome2',label:'Net Income',min:50,max:500,step:10,def:150,unit:'$M'}
  ],
  calc(v){
    const payoutRatio = v.totaldividends/v.netincome2*100;
    const retentionRate = 100-payoutRatio;
    const sustainableGrowth = (retentionRate/100)*0.15*100; // assume ROE=15% for illustration
    const pts = sweep(0,300,60,d=>d/v.netincome2*100);
    return {
      big:fmtNum(payoutRatio,2),bigUnit:'%',bigLabel:'Dividend Payout Ratio',
      subs:[{l:'Retention Rate',v:fmtNum(retentionRate,2)+'%'},{l:'Total Dividends',v:'$'+fmtNum(v.totaldividends,1)+'M'}],
      note:{type: payoutRatio>100?'danger':payoutRatio>80?'warn':'good', text: payoutRatio>100?'Payout ratio >100%: perusahaan membayar dividen LEBIH BESAR dari net income — tidak sustainable jangka panjang kecuali didanai dari cash reserves atau utang baru.':payoutRatio>80?'Payout ratio tinggi (>80%): sedikit modal yang ditahan untuk reinvestasi — cocok untuk perusahaan matang dengan growth opportunity terbatas, tapi membatasi kemampuan ekspansi organik.':'Payout ratio di rentang moderat — perusahaan menyeimbangkan antara memberi return ke shareholder dan menahan modal untuk reinvestasi/growth.'},
      chart:{xMin:0,xMax:300,yMin:0,yMax:Math.max(...pts.map(p=>p.y))*1.1,vline:v.totaldividends,hlines:[{y:100,color:COLORS.red,dash:true}],series:[{label:'Payout Ratio vs Total Dividends',color:COLORS.cyan,pts}]}
    };
  }
},
{
  id:'fcffmodel',ch:4,year:1986,who:'Alfred Rappaport',name:'Free Cash Flow to Firm (FCFF)',
  desc:'Mengukur cash flow yang tersedia untuk SEMUA penyedia modal (pemegang saham DAN kreditur) sebelum pembiayaan — basis untuk valuasi Enterprise Value, berbeda dari FCFE yang sudah memperhitungkan pembiayaan utang.',
  tex:'FCFF=EBIT(1-T_c)+\\text{Dep}-\\text{CapEx}-\\Delta NWC',
  vars:[
    {k:'ebit4',label:'EBIT',min:50,max:500,step:10,def:200,unit:'$M'},
    {k:'taxrate3',label:'Tax Rate',min:0,max:40,step:1,def:25,unit:'%'},
    {k:'dep2',label:'Depreciation',min:10,max:150,step:5,def:50,unit:'$M'},
    {k:'capex2',label:'CapEx',min:10,max:250,step:5,def:80,unit:'$M'},
    {k:'nwcchg2',label:'Δ Net Working Capital',min:-30,max:60,step:5,def:15,unit:'$M'}
  ],
  calc(v){
    const nopat = v.ebit4*(1-v.taxrate3/100);
    const fcff = nopat+v.dep2-v.capex2-v.nwcchg2;
    const reinvestmentRate = (v.capex2+v.nwcchg2-v.dep2)/nopat*100;
    const pts = sweep(10,250,60,cx=>nopat+v.dep2-cx-v.nwcchg2);
    return {
      big:fmtNum(fcff,2),bigUnit:'$M',bigLabel:'Free Cash Flow to Firm',
      subs:[{l:'NOPAT',v:'$'+fmtNum(nopat,1)+'M'},{l:'Reinvestment Rate',v:fmtNum(reinvestmentRate,1)+'%'}],
      note:{type: fcff<0?'danger':fcff<nopat*0.2?'warn':'good', text: fcff<0?'FCFF NEGATIF: perusahaan sedang berinvestasi (capex+NWC) lebih besar dari NOPAT+depresiasi yang dihasilkan — umum terjadi di fase ekspansi/growth tinggi, tapi tidak bisa berlanjut selamanya tanpa pendanaan eksternal.':fcff<nopat*0.2?'FCFF relatif kecil dibanding NOPAT: porsi besar laba operasi "terkunci" kembali ke reinvestment — wajar untuk perusahaan growth, tapi periksa apakah reinvestment menghasilkan return yang sepadan.':'FCFF solid relatif terhadap NOPAT — perusahaan menghasilkan cash flow signifikan SETELAH memenuhi kebutuhan reinvestasi untuk pertumbuhan.'},
      chart:{xMin:10,xMax:250,yMin:Math.min(...pts.map(p=>p.y))-10,yMax:Math.max(...pts.map(p=>p.y))+10,vline:v.capex2,hlines:[{y:0,color:COLORS.faint,dash:true}],series:[{label:'FCFF vs CapEx',color:COLORS.green,pts}]}
    };
  }
},
{
  id:'operatingcycle',ch:4,year:1900,who:'Praktik Manajemen Modal Kerja',name:'Operating Cycle vs Cash Cycle',
  desc:'Operating Cycle mengukur total waktu dari pembelian inventory sampai menerima cash dari penjualan — Cash Cycle (dari Bab 1) lebih ketat karena memperhitungkan kapan perusahaan SENDIRI harus membayar suppliernya.',
  tex:'\\text{Operating Cycle}=DIO+DSO',
  vars:[
    {k:'dio2',label:'Days Inventory Outstanding',min:5,max:120,step:1,def:40,unit:' hr'},
    {k:'dso2',label:'Days Sales Outstanding',min:5,max:90,step:1,def:35,unit:' hr'}
  ],
  calc(v){
    const operatingCycle = v.dio2+v.dso2;
    const pts = sweep(5,90,60,dso=>v.dio2+dso);
    return {
      big:fmtNum(operatingCycle,1),bigUnit:' hari',bigLabel:'Operating Cycle',
      subs:[{l:'DIO',v:fmtNum(v.dio2,0)+' hr'},{l:'DSO',v:fmtNum(v.dso2,0)+' hr'}],
      note:{type: operatingCycle>100?'warn':'info', text: operatingCycle>100?'Operating cycle panjang (>100 hari): modal terkunci cukup lama dari pembelian inventory sampai cash diterima dari pelanggan — bandingkan dengan DPO (days payable) untuk melihat apakah perusahaan punya cash cycle yang sehat (lihat formula Cash Conversion Cycle di Bab 1).':'Operating cycle dalam rentang yang umum untuk kebanyakan industri manufaktur/retail — kombinasikan dengan DPO untuk analisis cash cycle yang lebih lengkap.'},
      chart:{xMin:5,xMax:90,yMin:0,yMax:Math.max(...pts.map(p=>p.y))*1.1,vline:v.dso2,series:[{label:'Operating Cycle vs DSO',color:COLORS.cyan,pts}]}
    };
  }
}
]);

/* ===================== BAB 5: EQUITY RESEARCH & MARKETS (11) ===================== */
addF([
{
  id:'dilutedeps',ch:5,year:1969,who:'APB Opinion No. 15 (standar akuntansi AS)',name:'Basic vs Diluted EPS',
  desc:'Diluted EPS memperhitungkan EFEK DILUSI dari instrumen konversi (stock options, convertible bonds, warrants) jika semuanya dikonversi menjadi saham biasa — selalu LEBIH KECIL atau SAMA dengan Basic EPS, dan adalah angka yang lebih konservatif untuk valuasi.',
  tex:'\\text{Diluted EPS}=\\frac{NI-\\text{Preferred Div}}{\\text{Basic Shares}+\\text{Dilutive Shares}}',
  vars:[
    {k:'ni4',label:'Net Income',min:20,max:500,step:5,def:100,unit:'$M'},
    {k:'preddiv',label:'Preferred Dividends',min:0,max:50,step:1,def:5,unit:'$M'},
    {k:'basicshares',label:'Basic Shares Outstanding',min:10,max:500,step:5,def:50,unit:'M'},
    {k:'dilutiveshares',label:'Dilutive Shares (options/converts)',min:0,max:100,step:1,def:8,unit:'M'}
  ],
  calc(v){
    const basicEPS = (v.ni4-v.preddiv)/v.basicshares;
    const dilutedEPS = (v.ni4-v.preddiv)/(v.basicshares+v.dilutiveshares);
    const dilutionPct = (basicEPS-dilutedEPS)/basicEPS*100;
    const pts = sweep(0,100,60,ds=>(v.ni4-v.preddiv)/(v.basicshares+ds));
    return {
      big:fmtNum(dilutedEPS,3),bigUnit:'',bigLabel:'Diluted EPS',
      subs:[{l:'Basic EPS',v:'$'+fmtNum(basicEPS,3)},{l:'Dilution Effect',v:'-'+fmtNum(dilutionPct,2)+'%'}],
      note:{type: dilutionPct>15?'warn':'info', text: dilutionPct>15?'Dilution effect besar (>15%): perusahaan punya banyak stock options/convertible securities outstanding — investor harus selalu memakai Diluted EPS (bukan Basic) untuk valuasi P/E yang lebih konservatif dan akurat.':'Dilution effect relatif kecil — selisih antara Basic dan Diluted EPS tidak terlalu material untuk keputusan valuasi.'},
      chart:{xMin:0,xMax:100,yMin:0,yMax:basicEPS*1.1,vline:v.dilutiveshares,hlines:[{y:basicEPS,color:COLORS.faint,dash:true}],series:[{label:'Diluted EPS vs Dilutive Shares',color:COLORS.amber,pts}]}
    };
  }
},
{
  id:'earningsyield',ch:5,year:1930,who:'Praktik Value Investing Klasik',name:'Earnings Yield (Inverse P/E)',
  desc:'Kebalikan dari P/E ratio — menyatakan return yang "didapat" investor relatif terhadap harga, dalam bentuk yang mudah dibandingkan LANGSUNG dengan yield instrumen lain seperti obligasi pemerintah, dipopulerkan dalam strategi "Earnings Yield Gap".',
  tex:'\\text{Earnings Yield}=\\frac{EPS}{\\text{Price}}=\\frac{1}{P/E}',
  vars:[
    {k:'eps3',label:'Earnings per Share',min:0.5,max:15,step:0.1,def:4,unit:'$'},
    {k:'price3',label:'Harga Saham',min:5,max:300,step:1,def:60,unit:'$'},
    {k:'bondyield',label:'Yield Obligasi Pemerintah 10Y',min:1,max:8,step:0.1,def:4,unit:'%'}
  ],
  calc(v){
    const earningsYield = v.eps3/v.price3*100;
    const yieldGap = earningsYield-v.bondyield;
    const pts = sweep(5,300,60,p=>v.eps3/p*100);
    return {
      big:fmtNum(earningsYield,2),bigUnit:'%',bigLabel:'Earnings Yield',
      subs:[{l:'Implied P/E',v:fmtNum(v.price3/v.eps3,2)+'x'},{l:'Yield Gap vs Obligasi 10Y',v:(yieldGap>=0?'+':'')+fmtNum(yieldGap,2)+'pp'}],
      note:{type: yieldGap<0?'warn':yieldGap>4?'good':'info', text: yieldGap<0?'Earnings Yield LEBIH RENDAH dari yield obligasi pemerintah: saham secara relatif "mahal" dibanding fixed income — investor membayar premium untuk potensi growth, perlu yakin growth tersebut bisa terealisasi.':yieldGap>4?'Yield gap besar (>4pp): saham terlihat relatif murah dibanding obligasi — sinyal klasik value investing, meski perlu verifikasi kualitas earnings (lihat Accrual Ratio di Bab 1).':'Yield gap dalam rentang yang wajar secara historis untuk perbandingan ekuitas vs fixed income.'},
      chart:{xMin:5,xMax:300,yMin:0,yMax:Math.max(...pts.map(p=>p.y))*1.1,vline:v.price3,hlines:[{y:v.bondyield,color:COLORS.faint,dash:true}],series:[{label:'Earnings Yield vs Harga Saham',color:COLORS.cyan,pts}]}
    };
  }
},
{
  id:'roic',ch:5,year:1980,who:'Praktik Corporate Performance Analysis',name:'Return on Invested Capital (ROIC)',
  desc:'Mengukur efisiensi perusahaan menghasilkan profit dari SELURUH modal yang diinvestasikan (utang+ekuitas) — metrik kunci untuk membandingkan ROIC dengan WACC: jika ROIC>WACC, perusahaan menciptakan nilai ekonomis (lihat EVA di Bab 2).',
  tex:'ROIC=\\frac{NOPAT}{\\text{Invested Capital}}',
  vars:[
    {k:'nopat3',label:'NOPAT',min:20,max:400,step:5,def:100,unit:'$M'},
    {k:'investedcap2',label:'Invested Capital',min:100,max:2000,step:25,def:700,unit:'$M'},
    {k:'waccref',label:'WACC (untuk komparasi)',min:4,max:18,step:0.25,def:9,unit:'%'}
  ],
  calc(v){
    const roic = v.nopat3/v.investedcap2*100;
    const spread = roic-v.waccref;
    const pts = sweep(100,2000,60,ic=>v.nopat3/ic*100);
    return {
      big:fmtNum(roic,2),bigUnit:'%',bigLabel:'Return on Invested Capital',
      subs:[{l:'WACC',v:fmtNum(v.waccref,2)+'%'},{l:'ROIC - WACC Spread',v:(spread>=0?'+':'')+fmtNum(spread,2)+'pp'}],
      note:{type: spread<0?'danger':spread<2?'warn':'good', text: spread<0?'ROIC < WACC: perusahaan menghancurkan nilai ekonomis — setiap dollar modal baru yang diinvestasikan menghasilkan return LEBIH KECIL dari biaya modalnya sendiri.':spread<2?'Spread ROIC-WACC positif tapi tipis: margin keamanan ekonomis terbatas, perusahaan hampir di titik breakeven value creation.':'Spread ROIC-WACC besar dan positif: perusahaan secara konsisten menciptakan nilai ekonomis riil bagi seluruh penyedia modalnya.'},
      chart:{xMin:100,xMax:2000,yMin:0,yMax:Math.max(...pts.map(p=>p.y))*1.1,vline:v.investedcap2,hlines:[{y:v.waccref,color:COLORS.red,dash:true}],series:[{label:'ROIC vs Invested Capital',color:COLORS.green,pts}]}
    };
  }
},
{
  id:'hamadabeta',ch:5,year:1972,who:'Robert Hamada',name:'Hamada Equation (Levered vs Unlevered Beta)',
  desc:'Memisahkan risiko BISNIS (unlevered beta) dari risiko FINANSIAL akibat leverage — krusial untuk membandingkan risiko sistematis antar perusahaan dengan struktur modal berbeda, dan untuk re-levering beta peer saat membangun WACC perusahaan target.',
  tex:'\\beta_L=\\beta_U\\times[1+(1-T_c)\\frac{D}{E}]',
  vars:[
    {k:'betaunlevered',label:'Unlevered Beta (βᵤ)',min:0.3,max:2,step:0.05,def:0.8,unit:''},
    {k:'taxrate4',label:'Tax Rate',min:0,max:40,step:1,def:25,unit:'%'},
    {k:'detarget2',label:'D/E Ratio',min:0,max:4,step:0.1,def:1.2,unit:'x'}
  ],
  calc(v){
    const betaLevered = v.betaunlevered*(1+(1-v.taxrate4/100)*v.detarget2);
    const riskAddon = betaLevered-v.betaunlevered;
    const pts = sweep(0,4,60,de=>v.betaunlevered*(1+(1-v.taxrate4/100)*de));
    return {
      big:fmtNum(betaLevered,3),bigUnit:'',bigLabel:'Levered Beta (β_L)',
      subs:[{l:'Unlevered Beta',v:fmtNum(v.betaunlevered,3)},{l:'Risk Add-on dari Leverage',v:'+'+fmtNum(riskAddon,3)}],
      note:{type: betaLevered>1.8?'warn':'info', text: betaLevered>1.8?'Levered beta tinggi (>1.8): saham ini akan jauh lebih volatile dari pasar — kombinasi risiko bisnis dan leverage finansial membuat saham ini cocok untuk investor dengan toleransi risiko tinggi saja.':'Hamada Equation ini esensial saat melakukan comparable company analysis: SELALU unlever beta peer (hilangkan efek struktur modal mereka) sebelum re-lever dengan struktur modal target, supaya perbandingan risiko bisnis murni adil.'},
      chart:{xMin:0,xMax:4,yMin:0,yMax:Math.max(...pts.map(p=>p.y))*1.1,vline:v.detarget2,hlines:[{y:v.betaunlevered,color:COLORS.faint,dash:true},{y:1,color:COLORS.cyan,dash:true}],series:[{label:'Levered Beta vs D/E Ratio',color:COLORS.violet,pts}]}
    };
  }
},
{
  id:'capm',ch:5,year:1964,who:'William Sharpe, John Lintner, Jan Mossin',name:'Capital Asset Pricing Model (CAPM)',
  desc:'Model fundamental yang menghubungkan risiko SISTEMATIS (beta) sebuah aset dengan expected return-nya — landasan teori untuk menghitung cost of equity di WACC, dan basis untuk menilai apakah sebuah saham "fairly priced" relatif terhadap risikonya.',
  tex:'E(R_i)=R_f+\\beta_i[E(R_m)-R_f]',
  vars:[
    {k:'rf3',label:'Risk-Free Rate',min:1,max:8,step:0.1,def:4,unit:'%'},
    {k:'beta5',label:'Beta Saham',min:0.2,max:2.5,step:0.05,def:1.3,unit:''},
    {k:'marketpremium',label:'Equity Risk Premium',min:3,max:10,step:0.25,def:6,unit:'%'}
  ],

    return {
      big:fmtNum(expectedReturn,2),bigUnit:'%',bigLabel:'Expected Return — CAPM',
      subs:[{l:'Risk-Free Rate',v:fmtNum(v.rf3,2)+'%'},{l:'Risk Premium (β×ERP)',v:'+'+fmtNum(riskpremiumtotal,2)+'pp'}],
      note:{type: v.beta5>1.5?'warn':v.beta5<0.7?'info':'good', text: v.beta5>1.5?'Beta tinggi (>1.5): saham ini secara historis bergerak jauh lebih agresif dari pasar — expected return tinggi sebagai kompensasi, tapi drawdown saat market turun juga akan lebih dalam.':v.beta5<0.7?'Beta rendah (<0.7): saham bersifat defensif, bergerak lebih moderat dari pasar secara keseluruhan — cocok untuk porsi portfolio yang mencari stabilitas relatif.':'Beta mendekati 1: saham bergerak secara proporsional dengan pasar secara keseluruhan, profil risiko sistematis "rata-rata".'},
      chart:{xMin:0.2,xMax:2.5,yMin:0,yMax:Math.max(...pts.map(p=>p.y))*1.1,vline:v.beta5,hlines:[{y:v.rf3,color:COLORS.faint,dash:true}],series:[{label:'Expected Return vs Beta',color:COLORS.amber,pts}]}

},
{
  id:'treynorratio',ch:5,year:1965,who:'Jack Treynor',name:'Treynor Ratio',
  desc:'Mengukur excess return PER UNIT RISIKO SISTEMATIS (beta) — berbeda dari Sharpe Ratio yang memakai total volatility (standard deviation), Treynor lebih relevan untuk portfolio yang SUDAH terdiversifikasi (di mana risiko unik/idiosyncratic sudah dihilangkan).',
  tex:'\\text{Treynor}=\\frac{R_p-R_f}{\\beta_p}',
  vars:[
    {k:'portreturn',label:'Portfolio Return',min:2,max:30,step:0.5,def:14,unit:'%'},

  ],
  calc(v){

      big:fmtNum(treynor,3),bigUnit:'',bigLabel:'Treynor Ratio',

      note:{type: treynor<v.rf4*0.5?'warn':'info', text: 'Treynor Ratio paling berguna untuk MEMBANDINGKAN beberapa portfolio yang SUDAH terdiversifikasi dengan baik — untuk portfolio dengan diversifikasi buruk (masih banyak risiko idiosyncratic), Sharpe Ratio adalah metrik yang lebih tepat karena memakai TOTAL risk, bukan cuma systematic risk.'},
      chart:{xMin:0.3,xMax:2.5,yMin:0,yMax:Math.max(...pts.map(p=>p.y))*1.1,vline:v.portbeta,series:[{label:'Treynor Ratio vs Portfolio Beta',color:COLORS.cyan,pts}]}

{
  id:'freefloat',ch:5,year:2000,who:'Praktik Index Construction Modern (S&P, MSCI)',name:'Free Float Market Cap',
  desc:'Mengukur market cap HANYA dari saham yang benar-benar bisa diperdagangkan publik (mengecualikan saham yang dipegang insider, pemerintah, atau strategic holders) — metodologi standar yang dipakai index provider modern seperti S&P dan MSCI untuk weighting index.',
  tex:'\\text{Free Float Mcap}=\\text{Shares Outstanding}\\times(1-\\text{Insider \\%})\\times \\text{Price}',

      note:{type: v.insiderpct>50?'warn':'info', text: v.insiderpct>50?'Insider holding >50%: free float sangat terbatas — saham ini berisiko mengalami liquidity rendah, dan kemungkinan TIDAK akan masuk ke index mayor (yang biasanya mensyaratkan free float minimum tertentu untuk inklusi).':'Free float cukup besar untuk memenuhi syarat inklusi index mayor — likuiditas trading umumnya lebih baik dibanding saham dengan insider holding besar.'},
      chart:{xMin:0,xMax:80,yMin:0,yMax:totalMcap*1.1,vline:v.insiderpct,hlines:[{y:totalMcap,color:COLORS.faint,dash:true}],series:[{label:'Free Float Mcap vs Insider Holding %',color:COLORS.violet,pts}]}

{
  id:'evsales',ch:5,year:1990,who:'Praktik Investment Banking (sektor growth/unprofitable)',name:'EV/Sales (EV/Revenue) Multiple',
  desc:'Multiple valuasi yang dipakai ketika perusahaan belum profitable (EBITDA/earnings negatif), umum untuk startup, perusahaan growth-stage, atau sektor yang sedang investasi besar — kelemahannya: mengabaikan SAMA SEKALI perbedaan margin profitabilitas antar perusahaan.',

      chart:{xMin:50,xMax:1500,yMin:0,yMax:Math.max(...pts.map(p=>p.y))*1.1,vline:v.salestarget,series:[{label:'EV/Sales vs Annual Revenue',color:COLORS.amber,pts}]}
    };
  }
},
{
  id:'sustainablegrowth',ch:5,year:1962,who:'Robert Higgins',name:'Sustainable Growth Rate (SGR)',
  desc:'Tingkat growth MAKSIMUM yang bisa dicapai perusahaan TANPA menambah leverage finansial atau menerbitkan ekuitas baru — dihitung dari ROE dan retention rate, berguna untuk menilai apakah target growth manajemen realistis secara finansial.',
  tex:'SGR=ROE\\times \\text{Retention Rate}',

{
  id:'pricesalesratio',ch:5,year:1980,who:'Kenneth Fisher (popularisasi)',name:'Price-to-Sales (P/S) Ratio',
  desc:'Dipopulerkan Kenneth Fisher sebagai alternatif valuasi saat earnings tidak reliable (volatile/negatif) — membandingkan market cap dengan revenue, sering dipakai untuk screening saham cyclical di titik bawah siklus earnings.',
  tex:'P/S=\\frac{\\text{Market Cap}}{\\text{Annual Revenue}}',

      note:{type: v.netmargin2<0?'warn':'info', text: v.netmargin2<0?'Net margin NEGATIF: P/S menjadi metrik valuasi yang LEBIH RELEVAN dibanding P/E (yang tidak terdefinisi untuk earnings negatif) — umum dipakai untuk menilai growth company yang belum profitable.':'P/S paling informatif jika DIBANDINGKAN dengan peer di sektor yang SAMA dengan margin yang sebanding — P/S tinggi dengan margin tinggi bisa setara P/S rendah dengan margin tipis dalam hal implied P/E.'},
      chart:{xMin:50,xMax:1500,yMin:0,yMax:Math.max(...pts.map(p=>p.y))*1.1,vline:v.revenue2,series:[{label:'P/S Ratio vs Annual Revenue',color:COLORS.violet,pts}]}
