<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1, user-scalable=no">
<title>Wall Street Codex · 130+ Rumus Accounting & Corporate Finance Interaktif</title>
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/KaTeX/0.16.9/katex.min.css">
<style>
:root{
  --bg:#05080f;
  --bg2:#070b14;
  --panel:#0a0f1c;
  --panel2:#080c16;
  --border:#192234;
  --border-soft:#121a29;
  --text:#dde2ec;
  --dim:#7a839a;
  --faint:#4a5268;
  --amber:#ffb020;
  --amber-soft:rgba(255,176,32,.12);
  --cyan:#5ec8d8;
  --cyan-soft:rgba(94,200,216,.12);
  --green:#34d399;
  --red:#ef5d5d;
  --violet:#a78bfa;
  --mono:'IBM Plex Mono',ui-monospace,'SF Mono',Menlo,Consolas,monospace;
  --sans:'Inter',-apple-system,'Segoe UI',Roboto,sans-serif;
  --radius:10px;
}
*{box-sizing:border-box;}
html,body{margin:0;padding:0;height:100%;background:var(--bg);color:var(--text);font-family:var(--sans);}
body{overflow:hidden;}
::selection{background:var(--amber-soft);color:var(--amber);}
#app{display:flex;flex-direction:column;height:100vh;}

/* ---- topbar ---- */
#topbar{display:flex;align-items:center;gap:16px;padding:10px 16px;border-bottom:1px solid var(--border);background:linear-gradient(180deg,var(--bg2),var(--bg));flex-shrink:0;}
.brand{font-family:var(--mono);font-weight:700;font-size:15px;letter-spacing:.5px;color:var(--text);white-space:nowrap;display:flex;align-items:baseline;gap:2px;}
.brand .dot{color:var(--amber);}
.brand span.sub{color:var(--amber);font-weight:700;}
#hamburger{display:none;background:none;border:1px solid var(--border);color:var(--text);border-radius:8px;width:34px;height:34px;align-items:center;justify-content:center;cursor:pointer;flex-shrink:0;font-size:16px;}
.searchwrap{flex:1;max-width:420px;position:relative;}
.searchwrap input{width:100%;background:var(--panel2);border:1px solid var(--border);color:var(--text);padding:8px 12px 8px 30px;border-radius:8px;font-family:var(--sans);font-size:13px;outline:none;transition:border-color .15s;}
.searchwrap input:focus{border-color:var(--amber);}
.searchwrap::before{content:"⌕";position:absolute;left:10px;top:50%;transform:translateY(-50%);color:var(--faint);font-size:14px;pointer-events:none;}
.stat{font-family:var(--mono);font-size:11px;color:var(--dim);white-space:nowrap;margin-left:auto;letter-spacing:.3px;}
.stat b{color:var(--amber);}

/* ---- ticker ---- */
#ticker{height:30px;border-bottom:1px solid var(--border-soft);background:var(--panel2);overflow:hidden;position:relative;flex-shrink:0;}
#ticker::before,#ticker::after{content:"";position:absolute;top:0;bottom:0;width:40px;z-index:2;pointer-events:none;}
#ticker::before{left:0;background:linear-gradient(90deg,var(--panel2),transparent);}
#ticker::after{right:0;background:linear-gradient(-90deg,var(--panel2),transparent);}
#tickerTrack{display:flex;align-items:center;height:100%;white-space:nowrap;width:max-content;animation:tickerScroll 240s linear infinite;}
#ticker:hover #tickerTrack{animation-play-state:paused;}
@keyframes tickerScroll{from{transform:translateX(0);}to{transform:translateX(-50%);}}
.tick-item{font-family:var(--mono);font-size:11px;color:var(--faint);padding:0 18px;cursor:pointer;border-right:1px solid var(--border-soft);transition:color .15s;}
.tick-item:hover{color:var(--amber);}
.tick-item b{color:var(--dim);font-weight:600;}
.tick-item:hover b{color:var(--amber);}

/* ---- body layout ---- */
#body{flex:1;display:flex;overflow:hidden;min-height:0;position:relative;}
#sidebar{width:300px;flex-shrink:0;border-right:1px solid var(--border);overflow-y:auto;background:var(--bg2);}
#sidebar::-webkit-scrollbar{width:6px;}
#sidebar::-webkit-scrollbar-thumb{background:var(--border);border-radius:3px;}
.chapter-group{border-bottom:1px solid var(--border-soft);}
.chapter-head{display:flex;align-items:center;justify-content:space-between;padding:11px 14px;cursor:pointer;user-select:none;}
.chapter-head:hover{background:var(--panel);}
.chapter-head .ch-title{font-size:12px;font-weight:700;color:var(--text);letter-spacing:.3px;}
.chapter-head .ch-sub{font-size:10.5px;color:var(--faint);margin-top:2px;}
.chapter-head .ch-count{font-family:var(--mono);font-size:10.5px;color:var(--amber);background:var(--amber-soft);padding:2px 7px;border-radius:20px;flex-shrink:0;margin-left:8px;}
.chapter-head .chev{color:var(--faint);font-size:11px;margin-left:8px;transition:transform .15s;flex-shrink:0;}
.chapter-group.collapsed .chev{transform:rotate(-90deg);}
.chapter-body{overflow:hidden;}
.chapter-group.collapsed .chapter-body{display:none;}
.formula-row{display:flex;align-items:baseline;gap:8px;padding:7px 14px 7px 20px;cursor:pointer;border-left:2px solid transparent;transition:background .12s,border-color .12s;}
.formula-row:hover{background:var(--panel);}
.formula-row.active{background:var(--panel);border-left-color:var(--amber);}
.formula-row .yr{font-family:var(--mono);font-size:10.5px;color:var(--faint);flex-shrink:0;width:34px;}
.formula-row.active .yr{color:var(--amber);}
.formula-row .nm{font-size:12px;color:var(--dim);line-height:1.3;}
.formula-row.active .nm{color:var(--text);}
.formula-row.hidden{display:none;}

#main{flex:1;overflow-y:auto;padding:26px 32px 60px;min-width:0;}
#main::-webkit-scrollbar{width:8px;}
#main::-webkit-scrollbar-thumb{background:var(--border);border-radius:4px;}

.f-meta{display:flex;align-items:center;gap:10px;flex-wrap:wrap;margin-bottom:6px;}
.pill{font-family:var(--mono);font-size:10.5px;padding:3px 9px;border-radius:20px;border:1px solid var(--border);color:var(--dim);}
.pill.ch{color:var(--amber);border-color:var(--amber-soft);background:var(--amber-soft);}
.f-title{font-size:24px;font-weight:700;letter-spacing:-.2px;margin:0 0 4px;}
.f-who{font-family:var(--mono);font-size:12px;color:var(--faint);margin-bottom:16px;}
.f-desc{font-size:13.5px;color:var(--dim);line-height:1.65;max-width:780px;margin-bottom:18px;}

.f-formula-box{background:var(--panel2);border:1px solid var(--border);border-radius:var(--radius);padding:20px 18px;margin-bottom:20px;overflow-x:auto;}
.f-formula-box .katex{font-size:1.05em;color:var(--text);}
.f-formula-box .katex .mord,.f-formula-box .katex .mbin,.f-formula-box .katex .mrel{color:var(--text);}

.f-grid{display:grid;grid-template-columns:1.15fr 1fr;gap:18px;margin-bottom:18px;align-items:start;}
.card{background:var(--panel);border:1px solid var(--border);border-radius:var(--radius);padding:16px 18px;}
.card h4{margin:0 0 12px;font-size:11px;text-transform:uppercase;letter-spacing:.6px;color:var(--faint);font-weight:600;}

.ctrl{margin-bottom:14px;}
.ctrl:last-child{margin-bottom:0;}
.ctrl-label{display:flex;justify-content:space-between;font-size:12px;color:var(--dim);margin-bottom:6px;}
.ctrl-label .val{font-family:var(--mono);color:var(--amber);font-weight:600;}
input[type=range]{width:100%;height:4px;border-radius:2px;background:var(--border);outline:none;-webkit-appearance:none;accent-color:var(--amber);}
input[type=range]::-webkit-slider-thumb{-webkit-appearance:none;width:14px;height:14px;border-radius:50%;background:var(--amber);cursor:pointer;box-shadow:0 0 0 3px rgba(255,176,32,.18);}
input[type=range]::-moz-range-thumb{width:14px;height:14px;border-radius:50%;background:var(--amber);border:none;cursor:pointer;box-shadow:0 0 0 3px rgba(255,176,32,.18);}
.toggle-wrap{display:flex;background:var(--panel2);border:1px solid var(--border);border-radius:8px;overflow:hidden;}
.toggle-wrap button{flex:1;background:none;border:none;color:var(--dim);font-size:12px;padding:7px;cursor:pointer;font-family:var(--sans);transition:.15s;}
.toggle-wrap button.on{background:var(--amber-soft);color:var(--amber);font-weight:600;}

.readout-big{margin-bottom:14px;}
.readout-big .lbl{font-size:11px;color:var(--faint);text-transform:uppercase;letter-spacing:.5px;margin-bottom:4px;}
.readout-big .num{font-family:var(--mono);font-size:34px;font-weight:700;color:var(--amber);text-shadow:0 0 18px rgba(255,176,32,.35);line-height:1.1;letter-spacing:-.5px;}
.readout-big .num small{font-size:16px;font-weight:600;margin-left:3px;color:var(--amber);opacity:.8;}
.sub-stats{display:flex;flex-direction:column;gap:7px;margin-top:14px;border-top:1px solid var(--border-soft);padding-top:12px;}
.sub-stat{display:flex;justify-content:space-between;font-size:12px;}
.sub-stat .l{color:var(--faint);}
.sub-stat .v{font-family:var(--mono);color:var(--text);font-weight:600;}
.note-badge{margin-top:14px;font-size:11.5px;padding:9px 12px;border-radius:8px;line-height:1.5;}
.note-badge.info{background:var(--cyan-soft);color:var(--cyan);}
.note-badge.warn{background:rgba(255,176,32,.12);color:var(--amber);}
.note-badge.danger{background:rgba(239,93,93,.12);color:var(--red);}
.note-badge.good{background:rgba(52,211,153,.12);color:var(--green);}

.f-chartwrap{background:var(--panel);border:1px solid var(--border);border-radius:var(--radius);padding:16px 18px 10px;}
.chart-head{display:flex;align-items:center;justify-content:space-between;margin-bottom:8px;flex-wrap:wrap;gap:8px;}
.chart-head h4{margin:0;font-size:11px;text-transform:uppercase;letter-spacing:.6px;color:var(--faint);font-weight:600;}
#chartCanvas{display:block;width:100%;}
.legend{display:flex;gap:14px;flex-wrap:wrap;margin-top:8px;padding-top:8px;border-top:1px solid var(--border-soft);}
.legend-item{display:flex;align-items:center;gap:6px;font-size:11px;color:var(--dim);font-family:var(--mono);}
.legend-sw{width:10px;height:10px;border-radius:2px;flex-shrink:0;}
.legend-sw.dash{background:none;border-top:2px dashed var(--dim);height:0;width:14px;}
.randbtn{background:var(--panel2);border:1px solid var(--border);color:var(--amber);font-family:var(--mono);font-size:11px;padding:6px 12px;border-radius:7px;cursor:pointer;transition:.15s;white-space:nowrap;}
.randbtn:hover{background:var(--amber-soft);border-color:var(--amber);}
.randbtn:active{transform:scale(.96);}

.intro-card{background:linear-gradient(135deg,var(--panel),var(--panel2));border:1px solid var(--border);border-radius:var(--radius);padding:18px 20px;margin-bottom:20px;font-size:12.5px;color:var(--dim);line-height:1.6;}
.intro-card b{color:var(--amber);}

@media (max-width:880px){
  #hamburger{display:flex;}
  .stat{display:none;}
  #sidebar{position:absolute;left:0;top:0;bottom:0;z-index:10;transform:translateX(-100%);transition:transform .2s;box-shadow:8px 0 24px rgba(0,0,0,.4);}
  #sidebar.open{transform:translateX(0);}
  #body.sb-open::after{content:"";position:absolute;inset:0;background:rgba(0,0,0,.4);z-index:5;}
  #main{padding:18px 16px 50px;}
  .f-grid{grid-template-columns:1fr;}
  .f-title{font-size:20px;}
  .readout-big .num{font-size:28px;}
}
</style>
</head>

<script src="https://cdnjs.cloudflare.com/ajax/libs/KaTeX/0.16.9/katex.min.js"></script>
<script>
/* =========================================================
   QUANT CODEX — engine inti
   ========================================================= */

/* ---------- math helpers ---------- */
function clampNum(v,a,b){return Math.max(a,Math.min(b,v));}
function lerp(a,b,t){return a+(b-a)*t;}
function easeInOutCubic(t){return t<0.5?4*t*t*t:1-Math.pow(-2*t+2,3)/2;}

function erf(x){
  const s=x<0?-1:1; x=Math.abs(x);
  const a1=0.254829592,a2=-0.284496736,a3=1.421413741,a4=-1.453152027,a5=1.061405429,p=0.3275911;
  const t=1/(1+p*x);
  const y=1-(((((a5*t+a4)*t)+a3)*t+a2)*t+a1)*t*Math.exp(-x*x);
  return s*y;
}
function ncdf(x){return 0.5*(1+erf(x/Math.SQRT2));}
function npdf(x){return Math.exp(-x*x/2)/Math.sqrt(2*Math.PI);}
function invNcdf(p){
  if(p<=0)return -8; if(p>=1)return 8;
  const a=[-3.969683028665376e+01,2.209460984245205e+02,-2.759285104469687e+02,1.383577518672690e+02,-3.066479806614716e+01,2.506628277459239e+00];
  const b=[-5.447609879822406e+01,1.615858368580409e+02,-1.556989798598866e+02,6.680131188771972e+01,-1.328068155288572e+01];
  const c=[-7.784894002430293e-03,-3.223964580411365e-01,-2.400758277161838e+00,-2.549732539343734e+00,4.374664141464968e+00,2.938163982698783e+00];
  const d=[7.784695709041462e-03,3.224671290700398e-01,2.445134137142996e+00,3.754408661907416e+00];
  const plow=0.02425, phigh=1-plow; let q,r;
  if(p<plow){q=Math.sqrt(-2*Math.log(p));return (((((c[0]*q+c[1])*q+c[2])*q+c[3])*q+c[4])*q+c[5])/((((d[0]*q+d[1])*q+d[2])*q+d[3])*q+1);}
  if(p<=phigh){q=p-0.5;r=q*q;return (((((a[0]*r+a[1])*r+a[2])*r+a[3])*r+a[4])*r+a[5])*q/(((((b[0]*r+b[1])*r+b[2])*r+b[3])*r+b[4])*r+1);}
  q=Math.sqrt(-2*Math.log(1-p));
  return -(((((c[0]*q+c[1])*q+c[2])*q+c[3])*q+c[4])*q+c[5])/((((d[0]*q+d[1])*q+d[2])*q+d[3])*q+1);
}
function bsPrice(S,K,r,sigma,T,isCall){
  if(isCall===undefined)isCall=true;
  if(T<=0||sigma<=0)return Math.max(isCall?S-K:K-S,0);
  const d1=(Math.log(S/K)+(r+sigma*sigma/2)*T)/(sigma*Math.sqrt(T));
  const d2=d1-sigma*Math.sqrt(T);
  return isCall? S*ncdf(d1)-K*Math.exp(-r*T)*ncdf(d2) : K*Math.exp(-r*T)*ncdf(-d2)-S*ncdf(-d1);
}
function bsGreeks(S,K,r,sigma,T){
  const sqrtT=Math.sqrt(Math.max(T,1e-6));
  const d1=(Math.log(S/K)+(r+sigma*sigma/2)*T)/(sigma*sqrtT);
  const d2=d1-sigma*sqrtT;
  return {
    delta:ncdf(d1),
    gamma:npdf(d1)/(S*sigma*sqrtT),
    vega:S*npdf(d1)*sqrtT/100,
    theta:(-S*npdf(d1)*sigma/(2*sqrtT)-r*K*Math.exp(-r*T)*ncdf(d2))/365,
    rho:K*T*Math.exp(-r*T)*ncdf(d2)/100,
    call:S*ncdf(d1)-K*Math.exp(-r*T)*ncdf(d2)
  };
}
function crrBinomial(S,K,r,sigma,T,n,isCall){
  if(isCall===undefined)isCall=true;
  n=isFinite(n)?Math.max(2,Math.round(n)):15;
  const dt=T/n,u=Math.exp(sigma*Math.sqrt(dt)),d=1/u;
  const p=clampNum((Math.exp(r*dt)-d)/(u-d),0.001,0.999);
  let pr=new Array(n+1);
  for(let i=0;i<=n;i++){const ST=S*Math.pow(u,n-i)*Math.pow(d,i); pr[i]=isCall?Math.max(ST-K,0):Math.max(K-ST,0);}
  const disc=Math.exp(-r*dt);
  for(let step=n-1;step>=0;step--){for(let i=0;i<=step;i++){pr[i]=disc*(p*pr[i]+(1-p)*pr[i+1]);}}
  return pr[0];
}
function bivNormCdf(x,y,rho){
  const n=60,xlo=-8,ylo=-8;
  const dx=(x-xlo)/n,dy=(y-ylo)/n;
  const denom=2*Math.PI*Math.sqrt(Math.max(1-rho*rho,1e-6));
  let sum=0;
  for(let i=0;i<n;i++){
    const xi=xlo+dx*(i+0.5);
    for(let j=0;j<n;j++){
      const yj=ylo+dy*(j+0.5);
      const q=(xi*xi-2*rho*xi*yj+yj*yj)/(2*Math.max(1-rho*rho,1e-6));
      sum+=Math.exp(-q)/denom*dx*dy;
    }
  }
  return clampNum(sum,0,1);
}
function mulberry32(seed){
  let t=seed>>>0;
  return function(){
    t+=0x6D2B79F5; let r=t;
    r=Math.imul(r^(r>>>15),r|1);
    r^=r+Math.imul(r^(r>>>7),r|61);
    return ((r^(r>>>14))>>>0)/4294967296;
  };
}
function gaussRNG(rng){let u=0,v=0;while(u===0)u=rng();while(v===0)v=rng();return Math.sqrt(-2*Math.log(u))*Math.cos(2*Math.PI*v);}
function sweep(xmin,xmax,n,fn){const pts=[];for(let i=0;i<=n;i++){const x=xmin+(xmax-xmin)*i/n;pts.push({x,y:fn(x)});}return pts;}

/* ---------- formatting ---------- */
function fmtNum(v,dec){
  if(v===undefined||v===null||isNaN(v))return '–';
  dec=dec===undefined?2:dec;
  const neg=v<0; v=Math.abs(v);
  let s=v.toFixed(dec);
  let [int,frac]=s.split('.');
  int=int.replace(/\B(?=(\d{3})+(?!\d))/g,',');
  return (neg?'-':'')+int+(frac?'.'+frac:'');
}
function fmtAxis(v){
  const av=Math.abs(v);
  if(av>=1e9)return (v/1e9).toFixed(1)+'B';
  if(av>=1e6)return (v/1e6).toFixed(1)+'M';
  if(av>=1e3)return (v/1e3).toFixed(1)+'k';
  if(av>=1)return v.toFixed(av>=100?0:1);
  if(av===0)return '0';
  return v.toFixed(3);
}
function fmtCompact(v){
  if(v===undefined||v===null||isNaN(v))return '–';
  const neg=v<0; v=Math.abs(v);
  let s;
  if(v>=1e12)s=(v/1e12).toFixed(2)+'T';
  else if(v>=1e9)s=(v/1e9).toFixed(2)+'B';
  else if(v>=1e6)s=(v/1e6).toFixed(2)+'M';
  else if(v>=1e3)s=(v/1e3).toFixed(2)+'K';
  else s=fmtNum(v,2);
  return (neg?'-':'')+s;
}

/* ---------- colors ---------- */
const COLORS={bg:'#05080f',panel:'#0a0f1c',border:'#192234',borderSoft:'#121a29',text:'#dde2ec',dim:'#7a839a',faint:'#4a5268',
  amber:'#ffb020',cyan:'#5ec8d8',green:'#34d399',red:'#ef5d5d',violet:'#a78bfa'};

/* ---------- canvas drawing primitives ---------- */
function roundRectPath(ctx,x,y,w,h,r){
  ctx.beginPath();
  ctx.moveTo(x+r,y);
  ctx.arcTo(x+w,y,x+w,y+h,r);
  ctx.arcTo(x+w,y+h,x,y+h,r);
  ctx.arcTo(x,y+h,x,y,r);
  ctx.arcTo(x,y,x+w,y,r);
  ctx.closePath();
}
function interpY(pts,x){
  if(!pts||!pts.length)return null;
  if(x<=pts[0].x)return pts[0].y;
  if(x>=pts[pts.length-1].x)return pts[pts.length-1].y;
  for(let i=0;i<pts.length-1;i++){
    if(x>=pts[i].x&&x<=pts[i+1].x){
      const t=(x-pts[i].x)/((pts[i+1].x-pts[i].x)||1);
      return lerp(pts[i].y,pts[i+1].y,t);
    }
  }
  return pts[pts.length-1].y;
}
const MONOFONT="11px ui-monospace, 'IBM Plex Mono', Menlo, Consolas, monospace";

function drawLine(ctx,w,h,spec){
  const m={l:48,r:18,t:16,b:30};
  const pw=Math.max(10,w-m.l-m.r), ph=Math.max(10,h-m.t-m.b);
  const xMin=spec.xMin,xMax=spec.xMax,yMin=spec.yMin,yMax=spec.yMax;
  const sx=x=>m.l+(x-xMin)/((xMax-xMin)||1)*pw;
  const sy=y=>m.t+(1-(y-yMin)/((yMax-yMin)||1))*ph;
  ctx.clearRect(0,0,w,h);
  ctx.strokeStyle=COLORS.borderSoft; ctx.lineWidth=1; ctx.font=MONOFONT; ctx.fillStyle=COLORS.faint;
  for(let i=0;i<=4;i++){
    const yv=yMin+(yMax-yMin)*i/4, yy=sy(yv);
    ctx.beginPath();ctx.moveTo(m.l,yy);ctx.lineTo(w-m.r,yy);ctx.stroke();
    ctx.fillText(fmtAxis(yv),3,yy+3);
  }
  for(let i=0;i<=5;i++){
    const xv=xMin+(xMax-xMin)*i/5, xx=sx(xv);
    ctx.fillText(fmtAxis(xv),Math.min(Math.max(xx-12,m.l),w-m.r-22),h-m.b+16);
  }
  (spec.hlines||[]).forEach(hl=>{
    ctx.save();
    ctx.strokeStyle=hl.color||COLORS.dim; ctx.setLineDash(hl.dash===false?[]:[4,4]); ctx.lineWidth=1.2;
    const yy=sy(clampNum(hl.y,yMin,yMax));
    ctx.beginPath();ctx.moveTo(m.l,yy);ctx.lineTo(w-m.r,yy);ctx.stroke();
    ctx.restore();
  });
  (spec.series||[]).forEach(s=>{
    if(s.fillRange){
      const pts=s.pts.filter(p=>p.x>=s.fillRange[0]&&p.x<=s.fillRange[1]);
      if(pts.length>1){
        ctx.save();ctx.beginPath();
        ctx.moveTo(sx(pts[0].x),sy(yMin));
        pts.forEach(p=>ctx.lineTo(sx(p.x),sy(clampNum(p.y,yMin,yMax))));
        ctx.lineTo(sx(pts[pts.length-1].x),sy(yMin));
        ctx.closePath(); ctx.fillStyle=(s.color||COLORS.cyan)+'33'; ctx.fill(); ctx.restore();
      }
    }
    if(s.fill){
      ctx.save();ctx.beginPath();
      ctx.moveTo(sx(s.pts[0].x),sy(yMin));
      s.pts.forEach(p=>ctx.lineTo(sx(p.x),sy(clampNum(p.y,yMin,yMax))));
      ctx.lineTo(sx(s.pts[s.pts.length-1].x),sy(yMin));
      ctx.closePath(); ctx.fillStyle=(s.color||COLORS.cyan)+'1f'; ctx.fill(); ctx.restore();
    }
  });
  (spec.series||[]).forEach(s=>{
    ctx.save();
    ctx.strokeStyle=s.color||COLORS.cyan; ctx.lineWidth=2.2; ctx.lineJoin='round';
    if(s.dash)ctx.setLineDash([6,4]); else ctx.setLineDash([]);
    ctx.beginPath();
    s.pts.forEach((p,i)=>{const X=sx(p.x),Y=sy(clampNum(p.y,yMin,yMax));if(i===0)ctx.moveTo(X,Y);else ctx.lineTo(X,Y);});
    ctx.stroke(); ctx.restore();
  });
  if(spec.vline!=null){
    const xx=sx(clampNum(spec.vline,xMin,xMax));
    ctx.save();ctx.strokeStyle=COLORS.amber;ctx.setLineDash([3,3]);ctx.lineWidth=1.2;
    ctx.beginPath();ctx.moveTo(xx,m.t);ctx.lineTo(xx,h-m.b);ctx.stroke();ctx.restore();
    const s0=(spec.series||[])[0];
    if(s0){
      const yv=interpY(s0.pts,clampNum(spec.vline,xMin,xMax));
      if(yv!=null){
        const Y=sy(clampNum(yv,yMin,yMax));
        ctx.save();ctx.fillStyle=COLORS.amber;ctx.shadowColor=COLORS.amber;ctx.shadowBlur=9;
        ctx.beginPath();ctx.arc(xx,Y,4.5,0,Math.PI*2);ctx.fill();ctx.restore();
      }
    }
  }
  ctx.strokeStyle=COLORS.border;ctx.lineWidth=1;ctx.strokeRect(m.l,m.t,pw,ph);
}
function drawGauge(ctx,w,h,spec){
  ctx.clearRect(0,0,w,h);
  const barY=h/2-4, barH=20;
  const x0=20,x1=w-20;
  const sx=v=>x0+(clampNum(v,spec.min,spec.max)-spec.min)/((spec.max-spec.min)||1)*(x1-x0);
  (spec.zones||[]).forEach(z=>{
    const xa=sx(z.from),xb=sx(z.to);
    ctx.fillStyle=z.color; roundRectPath(ctx,xa,barY,Math.max(1,xb-xa),barH,4); ctx.fill();
  });
  ctx.strokeStyle=COLORS.border;ctx.lineWidth=1;roundRectPath(ctx,x0,barY,x1-x0,barH,6);ctx.stroke();
  ctx.font=MONOFONT;ctx.fillStyle=COLORS.dim;ctx.textAlign='center';
  (spec.zones||[]).forEach(z=>{
    const xc=(sx(z.from)+sx(z.to))/2;
    ctx.fillText(z.label,clampNum(xc,x0+30,x1-30),barY+barH+18);
  });
  const xv=sx(spec.value);
  ctx.save();ctx.strokeStyle=COLORS.text;ctx.lineWidth=2;
  ctx.beginPath();ctx.moveTo(xv,barY-8);ctx.lineTo(xv,barY+barH+8);ctx.stroke();
  ctx.fillStyle=COLORS.amber;ctx.shadowColor=COLORS.amber;ctx.shadowBlur=10;
  ctx.beginPath();ctx.moveTo(xv,barY-8);ctx.lineTo(xv-6,barY-18);ctx.lineTo(xv+6,barY-18);ctx.closePath();ctx.fill();
  ctx.restore();
  ctx.textAlign='center';ctx.font="bold 13px ui-monospace, 'IBM Plex Mono', Menlo, Consolas, monospace";ctx.fillStyle=COLORS.text;
  ctx.fillText(fmtNum(spec.value,spec.decimals===undefined?2:spec.decimals)+(spec.unit||''),clampNum(xv,x0+30,x1-30),barY-26);
  ctx.textAlign='left';
}
function drawBars(ctx,w,h,spec){
  ctx.clearRect(0,0,w,h);
  const m={l:48,r:18,t:24,b:34};
  const pw=Math.max(10,w-m.l-m.r), ph=Math.max(10,h-m.t-m.b);
  const vals=spec.bars.map(b=>b.value);
  let yMin=Math.min(0,...vals), yMax=Math.max(0,...vals);
  if(yMin===yMax)yMax=yMin+1;
  const pad=(yMax-yMin)*0.18||1; yMin-=pad; yMax+=pad;
  const sy=v=>m.t+(1-(v-yMin)/((yMax-yMin)||1))*ph;
  const zeroY=sy(0);
  ctx.strokeStyle=COLORS.borderSoft;ctx.lineWidth=1;
  ctx.beginPath();ctx.moveTo(m.l,zeroY);ctx.lineTo(w-m.r,zeroY);ctx.stroke();
  const n=spec.bars.length, gap=pw/n, bw=Math.min(gap*0.55,70);
  ctx.font=MONOFONT;ctx.textAlign='center';
  spec.bars.forEach((b,i)=>{
    const xc=m.l+gap*i+gap/2;
    const y0=zeroY,y1=sy(b.value);
    const top=Math.min(y0,y1), hgt=Math.max(2,Math.abs(y1-y0));
    ctx.fillStyle=b.color||COLORS.cyan;
    roundRectPath(ctx,xc-bw/2,top,bw,hgt,3);ctx.fill();
    ctx.fillStyle=COLORS.text;
    ctx.fillText(fmtNum(b.value,spec.decimals===undefined?1:spec.decimals)+(spec.unit||''),xc,(b.value>=0?top-7:top+hgt+15));
    ctx.fillStyle=COLORS.dim;
    ctx.fillText(b.label,xc,h-m.b+16);
  });
  ctx.strokeStyle=COLORS.border;ctx.strokeRect(m.l,m.t,pw,ph);
}

function lerpSpec(from,to,e){
  if(!from||from.mode!==to.mode)from=null;
  if(to.mode==='gauge'){
    const fv=from?from.value:to.min;
    return Object.assign({},to,{value:lerp(fv,to.value,e)});
  }
  if(to.mode==='bars'){
    return Object.assign({},to,{bars:to.bars.map((b,i)=>{
      const fv=(from&&from.bars&&from.bars[i])?from.bars[i].value:0;
      return Object.assign({},b,{value:lerp(fv,b.value,e)});
    })});
  }
  return Object.assign({},to,{
    vline: to.vline==null?to.vline:lerp((from&&from.vline!=null)?from.vline:to.vline,to.vline,e),
    series: to.series.map((s,si)=>Object.assign({},s,{pts:s.pts.map((p,pi)=>{
      const fp=(from&&from.series&&from.series[si]&&from.series[si].pts[pi])?from.series[si].pts[pi]:null;
      return {x:p.x,y: fp? lerp(fp.y,p.y,e) : lerp(to.yMin,p.y,e)};
    })})),
    hlines: (to.hlines||[]).map((hl,i)=>{
      const fh=(from&&from.hlines&&from.hlines[i])?from.hlines[i]:null;
      return Object.assign({},hl,{y: fh? lerp(fh.y,hl.y,e): hl.y});
    })
  });
}

class QChart{
  constructor(canvas){
    this.canvas=canvas; this.ctx=canvas.getContext('2d');
    this.cur=null; this.raf=null;
    this._resize();
    this._ro=new ResizeObserver(()=>this._resize());
    this._ro.observe(canvas.parentElement);
  }
  _resize(){
    const dpr=window.devicePixelRatio||1;
    const rect=this.canvas.parentElement.getBoundingClientRect();
    const hpx= window.innerWidth<=880?220:264;
    this.w=Math.max(260,rect.width-2); this.h=hpx;
    this.canvas.width=this.w*dpr; this.canvas.height=this.h*dpr;
    this.canvas.style.width=this.w+'px'; this.canvas.style.height=this.h+'px';
    this.ctx.setTransform(dpr,0,0,dpr,0,0);
    if(this.cur)this._draw(this.cur);
  }
  destroy(){ if(this._ro)this._ro.disconnect(); cancelAnimationFrame(this.raf); }
  _draw(spec){
    if(spec.mode==='gauge')drawGauge(this.ctx,this.w,this.h,spec);
    else if(spec.mode==='bars')drawBars(this.ctx,this.w,this.h,spec);
    else drawLine(this.ctx,this.w,this.h,spec);
  }
  set(spec){
    cancelAnimationFrame(this.raf);
    const from=this.cur, to=spec;
    const start=performance.now(); const dur= from?380:680;
    const step=(now)=>{
      const k=Math.min(1,(now-start)/dur); const e=easeInOutCubic(k);
      this._draw(lerpSpec(from,to,e));
      if(k<1){this.raf=requestAnimationFrame(step);} else {this.cur=to;}
    };
    this.raf=requestAnimationFrame(step);
  }
}

      chart:{xMin:0,xMax:90,yMin:Math.min(...pts.map(p=>p.y))-5,yMax:Math.max(...pts.map(p=>p.y))+5,vline:v.dpo,hlines:[{y:0,color:COLORS.faint,dash:true}],series:[{label:'CCC vs Days Payable Outstanding',color:COLORS.cyan,pts}]}
    };
  }
},
{
  id:'operatingleverage',ch:1,year:1950,who:'Praktik Cost Accounting',name:'Degree of Operating Leverage (DOL)',
  desc:'Mengukur sensitivitas EBIT terhadap perubahan penjualan — perusahaan dengan fixed cost tinggi (manufaktur berat) punya DOL tinggi, artinya EBIT sangat volatile terhadap fluktuasi sales.',
  tex:'DOL=\\frac{\\%\\Delta EBIT}{\\%\\Delta Sales}=\\frac{\\text{Contribution Margin}}{EBIT}',
  vars:[
    {k:'contMargin',label:'Contribution Margin',min:50,max:500,step:10,def:200,unit:'$M'},
    {k:'fixedCost',label:'Fixed Cost',min:20,max:400,step:10,def:120,unit:'$M'}
  ],
  calc(v){
    const ebit = v.contMargin - v.fixedCost;
    const dol = ebit !== 0 ? v.contMargin/ebit : Infinity;
    const pts = sweep(20,400,60,fc=>{ const e=v.contMargin-fc; return e!==0? v.contMargin/e : null; }).filter(p=>p.y!==null && Math.abs(p.y)<20);
    return {
      big: isFinite(dol)?fmtNum(dol,2):'∞',bigUnit:'x',bigLabel:'Degree of Operating Leverage',
      subs:[{l:'EBIT',v:'$'+fmtNum(ebit,1)+'M'},{l:'Contribution Margin',v:'$'+fmtNum(v.contMargin,1)+'M'}],
      note:{type: dol>3?'warn':dol<0?'danger':'good', text: dol<0?'EBIT negatif: perusahaan beroperasi di bawah titik impas (break-even) pada level fixed cost ini.':dol>3?'DOL tinggi (>3x): EBIT SANGAT sensitif terhadap perubahan sales — kenaikan 10% sales bisa menghasilkan kenaikan EBIT >30%, tapi sebaliknya juga berlaku saat sales turun.':'DOL moderat: struktur biaya relatif seimbang antara fixed dan variable cost.'},
      chart:{xMin:20,xMax:400,yMin:-10,yMax:10,vline:v.fixedCost,hlines:[{y:0,color:COLORS.faint,dash:true}],series:[{label:'DOL vs Fixed Cost',color:COLORS.amber,pts}]}
    };
  }
},
{
  id:'financialleverage',ch:1,year:1950,who:'Praktik Corporate Finance',name:'Degree of Financial Leverage (DFL)',
  desc:'Mengukur sensitivitas EPS terhadap perubahan EBIT — semakin besar proporsi utang (dan beban bunga fixed), semakin tinggi DFL, artinya EPS jadi lebih volatile terhadap fluktuasi operasional.',
  tex:'DFL=\\frac{\\%\\Delta EPS}{\\%\\Delta EBIT}=\\frac{EBIT}{EBIT-\\text{Interest}}',
  vars:[
    {k:'ebit2',label:'EBIT',min:20,max:400,step:5,def:150,unit:'$M'},
    {k:'interest2',label:'Interest Expense',min:0,max:200,step:5,def:40,unit:'$M'}
  ],
  calc(v){
    const ebt = v.ebit2-v.interest2;
    const dfl = ebt !== 0 ? v.ebit2/ebt : Infinity;
    const pts = sweep(0,200,60,i=>{ const e=v.ebit2-i; return e>0.01? v.ebit2/e : null; }).filter(p=>p.y!==null && p.y<15);
    return {
      big: isFinite(dfl)?fmtNum(dfl,2):'∞',bigUnit:'x',bigLabel:'Degree of Financial Leverage',
      subs:[{l:'EBT (EBIT-Interest)',v:'$'+fmtNum(ebt,1)+'M'},{l:'EBIT',v:'$'+fmtNum(v.ebit2,1)+'M'}],
      note:{type: dfl>3?'warn':dfl<0?'danger':'good', text: dfl<0?'EBT negatif: beban bunga melebihi EBIT — perusahaan dalam kondisi distress finansial serius.':dfl>3?'DFL tinggi (>3x): EPS sangat sensitif terhadap perubahan EBIT akibat leverage finansial besar — risiko volatility laba per saham meningkat tajam.':'DFL moderat: struktur modal tidak terlalu agresif dalam menggunakan utang.'},
      chart:{xMin:0,xMax:200,yMin:0,yMax:8,vline:v.interest2,series:[{label:'DFL vs Interest Expense',color:COLORS.red,pts}]}
    };
  }
},
{
  id:'workingcapitalturn',ch:1,year:1900,who:'Praktik Manajemen Keuangan',name:'Working Capital Turnover',
  desc:'Mengukur seberapa efisien perusahaan menggunakan modal kerja untuk menghasilkan penjualan — rasio tinggi bisa berarti efisiensi tinggi, TAPI rasio EKSTREM tinggi juga bisa mengindikasikan modal kerja terlalu tipis (risiko likuiditas).',
  tex:'\\text{WC Turnover}=\\frac{\\text{Net Sales}}{\\text{Working Capital}}',
  vars:[
    {k:'netsales',label:'Net Sales',min:100,max:2000,step:25,def:800,unit:'$M'},
    {k:'wc',label:'Working Capital (CA-CL)',min:10,max:500,step:10,def:150,unit:'$M'}
  ],
  calc(v){
    const turnover = v.netsales/v.wc;
    const pts = sweep(10,500,60,wc=>v.netsales/wc);
    return {
      big:fmtNum(turnover,2),bigUnit:'x',bigLabel:'Working Capital Turnover',
      subs:[{l:'Net Sales',v:'$'+fmtNum(v.netsales,0)+'M'},{l:'Working Capital',v:'$'+fmtNum(v.wc,0)+'M'}],
      note:{type: turnover>15?'warn':turnover<2?'info':'good', text: turnover>15?'Turnover sangat tinggi (>15x): modal kerja relatif sangat tipis dibanding penjualan — efisien, tapi juga rentan terhadap shock likuiditas mendadak (misal supplier menuntut pembayaran lebih cepat).':turnover<2?'Turnover rendah (<2x): perusahaan menahan modal kerja relatif besar dibanding penjualannya — bisa jadi tanda inventory/receivables tidak terkelola optimal.':'Working capital turnover dalam rentang sehat untuk kebanyakan model bisnis.'},
      chart:{xMin:10,xMax:500,yMin:0,yMax:Math.max(...pts.map(p=>p.y))*1.1,vline:v.wc,series:[{label:'WC Turnover vs Working Capital',color:COLORS.green,pts}]}
    };
  }
},
{
  id:'grossmargin',ch:1,year:1900,who:'Praktik Akuntansi Dasar',name:'Gross & Operating Margin',
  desc:'Dua metrik margin paling fundamental — Gross Margin mengukur efisiensi produksi langsung (COGS), Operating Margin menambahkan biaya operasional (SG&A) untuk gambaran profitabilitas inti bisnis.',
  tex:'\\text{Gross Margin}=\\frac{\\text{Revenue}-COGS}{\\text{Revenue}},\\quad\\text{Op. Margin}=\\frac{EBIT}{\\text{Revenue}}',
  vars:[
    {k:'revenue',label:'Revenue',min:100,max:2000,step:25,def:1000,unit:'$M'},
    {k:'cogs',label:'COGS',min:50,max:1500,step:25,def:600,unit:'$M'},
    {k:'sga',label:'SG&A + Operating Expenses',min:20,max:600,step:10,def:250,unit:'$M'}
  ],
  calc(v){
    const grossProfit = v.revenue-v.cogs;
    const grossMargin = grossProfit/v.revenue*100;
    const ebit = grossProfit-v.sga;
    const opMargin = ebit/v.revenue*100;
    const pts = sweep(50,1500,60,cogs=>(v.revenue-cogs)/v.revenue*100);
    return {
      big:fmtNum(grossMargin,2),bigUnit:'%',bigLabel:'Gross Margin',
      subs:[{l:'Operating Margin (EBIT)',v:fmtNum(opMargin,2)+'%'},{l:'Gross Profit',v:'$'+fmtNum(grossProfit,1)+'M'},{l:'EBIT',v:'$'+fmtNum(ebit,1)+'M'}],
      note:{type: opMargin<0?'danger':grossMargin-opMargin>30?'warn':'good', text: opMargin<0?'Operating margin NEGATIF: bisnis merugi secara operasional meski mungkin gross margin terlihat sehat — SG&A terlalu besar relatif terhadap gross profit.':grossMargin-opMargin>30?'Gap besar antara Gross Margin dan Operating Margin: SG&A/opex memakan porsi besar dari gross profit — periksa efisiensi biaya operasional.':'Struktur margin sehat — gap antara gross dan operating margin wajar untuk model bisnis kebanyakan industri.'},
      chart:{xMin:50,xMax:1500,yMin:Math.min(...pts.map(p=>p.y))-5,yMax:100,vline:v.cogs,series:[{label:'Gross Margin vs COGS',color:COLORS.amber,pts}]}
    };
  }
},
{
  id:'receivablesturn',ch:1,year:1900,who:'Praktik Akuntansi Manajerial',name:'Receivables & Inventory Turnover',
  desc:'Mengukur berapa kali per tahun perusahaan "mengkonversi" receivables menjadi cash, dan inventory menjadi penjualan — indikator kunci efisiensi manajemen modal kerja dan potensi masalah collection/obsolescence.',
  tex:'\\text{AR Turnover}=\\frac{\\text{Net Credit Sales}}{\\text{Avg. AR}},\\quad\\text{Inv. Turnover}=\\frac{COGS}{\\text{Avg. Inventory}}',
  vars:[
    {k:'creditsales',label:'Net Credit Sales',min:100,max:1500,step:25,def:600,unit:'$M'},
    {k:'avgar',label:'Average Accounts Receivable',min:10,max:300,step:5,def:60,unit:'$M'},
    {k:'cogs2',label:'COGS',min:50,max:1000,step:25,def:400,unit:'$M'},
    {k:'avginv',label:'Average Inventory',min:10,max:300,step:5,def:80,unit:'$M'}
  ],
  calc(v){
    const arTurn = v.creditsales/v.avgar;
    const invTurn = v.cogs2/v.avginv;
    const dso = 365/arTurn;
    const dio = 365/invTurn;
    const pts = sweep(10,300,60,ar=>v.creditsales/ar);
    return {
      big:fmtNum(arTurn,2),bigUnit:'x',bigLabel:'Receivables Turnover',
      subs:[{l:'Days Sales Outstanding',v:fmtNum(dso,1)+' hr'},{l:'Inventory Turnover',v:fmtNum(invTurn,2)+'x'},{l:'Days Inventory Outstanding',v:fmtNum(dio,1)+' hr'}],
      note:{type: dso>60?'warn':dio>90?'warn':'good', text: dso>60?'DSO >60 hari: collection dari pelanggan relatif lambat — periksa kualitas credit policy atau potensi masalah cash flow dari customer yang menunggak.':dio>90?'DIO >90 hari: inventory tertahan cukup lama — risiko obsolescence atau permintaan yang melambat, terutama untuk produk dengan siklus hidup pendek.':'Kecepatan konversi AR dan inventory ke cash berada dalam rentang sehat.'},
      chart:{xMin:10,xMax:300,yMin:0,yMax:Math.max(...pts.map(p=>p.y))*1.1,vline:v.avgar,series:[{label:'AR Turnover vs Avg. Receivables',color:COLORS.cyan,pts}]}
    };
  }
}
]);

/* ===================== BAB 2: FUNDAMENTAL VALUATION (12) ===================== */
addF([
{
  id:'dcfgrowth',ch:2,year:1938,who:'John Burr Williams',name:'Discounted Cash Flow (DCF) — Gordon Terminal',
  desc:'Metode valuasi paling fundamental: nilai perusahaan adalah PRESENT VALUE dari seluruh free cash flow masa depan — menggabungkan periode proyeksi eksplisit dengan terminal value yang diasumsikan tumbuh konstan selamanya.',
  tex:'EV=\\sum_{t=1}^{n}\\frac{FCF_t}{(1+WACC)^t}+\\frac{FCF_n(1+g)}{(WACC-g)(1+WACC)^n}',
  vars:[
    {k:'fcf0',label:'FCF Tahun Ini',min:10,max:300,step:5,def:100,unit:'$M'},
    {k:'growth',label:'Growth Rate (5 thn proyeksi)',min:0,max:30,step:0.5,def:10,unit:'%'},
    {k:'wacc',label:'WACC (discount rate)',min:4,max:20,step:0.25,def:10,unit:'%'},
    {k:'termgrowth',label:'Terminal Growth Rate',min:0,max:5,step:0.1,def:3,unit:'%'}
  ],
  calc(v){
    const n=5;
    let pvSum=0, fcf=v.fcf0, lastFcf=0;
    for(let t=1;t<=n;t++){
      fcf = fcf*(1+v.growth/100);
      pvSum += fcf/Math.pow(1+v.wacc/100,t);
      lastFcf = fcf;
    }
    const termValue = lastFcf*(1+v.termgrowth/100)/((v.wacc-v.termgrowth)/100);
    const pvTerm = termValue/Math.pow(1+v.wacc/100,n);
    const ev = pvSum+pvTerm;
    const pts = sweep(4,20,60,w=>{
      let pv=0, f=v.fcf0, last=0;
      for(let t=1;t<=n;t++){ f=f*(1+v.growth/100); pv+=f/Math.pow(1+w/100,t); last=f; }
      const tv = last*(1+v.termgrowth/100)/((w-v.termgrowth)/100);
      return pv+tv/Math.pow(1+w/100,n);
    });
    return {
      big:fmtNum(ev,1),bigUnit:'$M',bigLabel:'Enterprise Value (DCF)',
      subs:[{l:'PV of 5-Yr FCFs',v:'$'+fmtNum(pvSum,1)+'M'},{l:'Terminal Value',v:'$'+fmtNum(termValue,1)+'M'},{l:'PV of Terminal Value',v:'$'+fmtNum(pvTerm,1)+'M'},{l:'% EV dari Terminal Value',v:fmtNum(pvTerm/ev*100,1)+'%'}],
      note:{type: pvTerm/ev>0.75?'warn':'info', text: pvTerm/ev>0.75?'Lebih dari 75% Enterprise Value berasal dari Terminal Value — valuasi SANGAT sensitif terhadap asumsi growth jangka panjang dan WACC, bukan dari cash flow yang bisa diprediksi dengan keyakinan tinggi.':'Proporsi terminal value relatif wajar — sebagian besar nilai didukung oleh proyeksi cash flow eksplisit yang lebih bisa diverifikasi.'},
      chart:{xMin:4,xMax:20,yMin:0,yMax:Math.max(...pts.filter(p=>isFinite(p.y)&&p.y>0).map(p=>p.y))*1.15,vline:v.wacc,series:[{label:'Enterprise Value vs WACC',color:COLORS.amber,pts:pts.filter(p=>isFinite(p.y)&&p.y>0&&p.y<ev*5)}]}
    };
  }
},
{
  id:'gordongrowth',ch:2,year:1956,who:'Myron Gordon & Eli Shapiro',name:'Gordon Growth Model (DDM)',
  desc:'Model valuasi saham berdasarkan dividen yang diharapkan tumbuh konstan selamanya — sangat sensitif terhadap selisih (r-g), sehingga hanya cocok untuk perusahaan dividen MATANG dan stabil, bukan growth stock.',
  tex:'P_0=\\frac{D_1}{r-g}',
  vars:[
    {k:'d1',label:'Dividen Tahun Depan (D₁)',min:0.5,max:20,step:0.25,def:5,unit:'$'},
    {k:'r',label:'Required Return (r)',min:4,max:20,step:0.25,def:10,unit:'%'},
    {k:'g',label:'Growth Rate Dividen (g)',min:0,max:8,step:0.25,def:4,unit:'%'}
  ],
  calc(v){
    const spread = (v.r-v.g)/100;
    const price = spread>0 ? v.d1/spread : Infinity;
    const pts = sweep(4,8,60,g=>{ const s=(v.r-g)/100; return s>0.005? v.d1/s : null; }).filter(p=>p.y!==null);
    return {
      big: isFinite(price)?fmtNum(price,2):'∞',bigUnit:'',bigLabel:'Harga Wajar Saham (P₀)',
      subs:[{l:'r - g (spread)',v:fmtNum(v.r-v.g,2)+'%'},{l:'Dividend Yield Implied',v:fmtNum(v.d1/price*100,2)+'%'}],
      note:{type: (v.r-v.g)<2?'danger':(v.r-v.g)<4?'warn':'good', text: (v.r-v.g)<2?'Spread (r-g) sangat kecil (<2%): harga menjadi HIPER-sensitif terhadap asumsi growth — perubahan kecil pada g bisa mengubah valuasi secara dramatis. Model ini berbahaya dipakai di kondisi ini.':(v.r-v.g)<4?'Spread cukup tipis: valuasi cukup sensitif terhadap asumsi growth, gunakan dengan hati-hati dan sensitivity analysis.':'Spread (r-g) wajar — model memberikan estimasi yang relatif stabil terhadap perubahan kecil asumsi.'},
      chart:{xMin:4,xMax:8,yMin:0,yMax:Math.max(...pts.filter(p=>p.y<500).map(p=>p.y))*1.15,vline:v.g,series:[{label:'Harga Saham vs Growth Rate',color:COLORS.cyan,pts:pts.filter(p=>p.y<500)}]}
    };
  }
},
{
  id:'evebitda',ch:2,year:1980,who:'Praktik Investment Banking',name:'EV/EBITDA Multiple Valuation',
  desc:'Multiple valuasi paling populer di M&A dan comps analysis — membandingkan Enterprise Value perusahaan terhadap EBITDA-nya, mengabaikan perbedaan struktur modal dan kebijakan depresiasi antar perusahaan.',
  tex:'EV=\\text{EBITDA}\\times\\text{Multiple Peer}',
  vars:[
    {k:'ebitda',label:'EBITDA Target',min:20,max:500,step:5,def:150,unit:'$M'},
    {k:'multiple',label:'Peer EV/EBITDA Multiple',min:3,max:25,step:0.5,def:9,unit:'x'},
    {k:'netdebt',label:'Net Debt Target',min:-100,max:500,step:10,def:100,unit:'$M'}
  ],
  calc(v){
    const ev = v.ebitda*v.multiple;
    const equityValue = ev-v.netdebt;
    const pts = sweep(3,25,60,m=>v.ebitda*m);
    return {
      big:fmtNum(ev,1),bigUnit:'$M',bigLabel:'Implied Enterprise Value',
      subs:[{l:'Implied Equity Value',v:'$'+fmtNum(equityValue,1)+'M'},{l:'Net Debt',v:'$'+fmtNum(v.netdebt,1)+'M'}],
      note:{type: v.multiple>15?'warn':v.multiple<5?'info':'good', text: v.multiple>15?'Multiple >15x EBITDA: peer group dihargai sangat premium — pastikan target memang sebanding kualitasnya (growth, margin, risiko) dengan peer yang dipakai sebagai basis, atau valuasi bisa terlalu optimis.':v.multiple<5?'Multiple sangat rendah (<5x): bisa mengindikasikan sektor yang out-of-favor, atau ada risiko structural yang membuat pasar mendiskon valuasi perusahaan sejenis.':'Multiple berada di rentang wajar untuk kebanyakan sektor industri matang.'},
      chart:{xMin:3,xMax:25,yMin:0,yMax:Math.max(...pts.map(p=>p.y))*1.1,vline:v.multiple,series:[{label:'Enterprise Value vs Multiple',color:COLORS.amber,pts}]}
    };
  }
},
{
  id:'residualincome',ch:2,year:1890,who:'Alfred Marshall (konsep), formalisasi modern Ohlson',name:'Residual Income Model',
  desc:'Mengukur nilai EKONOMIS yang diciptakan perusahaan SETELAH memperhitungkan biaya modal ekuitas — berbeda dengan akuntansi tradisional yang hanya melihat laba bersih tanpa "membebankan" cost of equity.',
  tex:'RI=NI-(r_e\\times \\text{Book Value Equity})',
  vars:[
    {k:'ni2',label:'Net Income',min:10,max:300,step:5,def:80,unit:'$M'},
    {k:'re',label:'Cost of Equity (rₑ)',min:4,max:20,step:0.25,def:10,unit:'%'},
    {k:'bve',label:'Book Value of Equity',min:100,max:1500,step:25,def:500,unit:'$M'}
  ],
  calc(v){
    const equityCharge = v.re/100*v.bve;
    const ri = v.ni2-equityCharge;
    const roe = v.ni2/v.bve*100;
    const pts = sweep(100,1500,60,bve=>v.ni2-(v.re/100*bve));
    return {
      big:fmtNum(ri,2),bigUnit:'$M',bigLabel:'Residual Income',
      subs:[{l:'Equity Charge (rₑ×BVE)',v:'$'+fmtNum(equityCharge,1)+'M'},{l:'ROE Implied',v:fmtNum(roe,2)+'%'},{l:'ROE vs Cost of Equity',v:fmtNum(roe-v.re,2)+'pp'}],
      note:{type: ri<0?'danger':ri/v.ni2<0.1?'warn':'good', text: ri<0?'Residual Income NEGATIF: perusahaan secara akuntansi profitable (NI positif), tapi secara EKONOMIS menghancurkan nilai — ROE-nya lebih rendah dari cost of equity yang dituntut investor.':ri/v.ni2<0.1?'Residual Income positif tapi tipis: perusahaan baru sedikit di atas breakeven ekonomis relatif terhadap tuntutan return investor.':'Residual Income kuat positif: perusahaan menciptakan nilai ekonomis riil di atas biaya modal ekuitasnya — sinyal kualitas manajemen modal yang baik.'},
      chart:{xMin:100,xMax:1500,yMin:Math.min(...pts.map(p=>p.y))-10,yMax:Math.max(...pts.map(p=>p.y))+10,vline:v.bve,hlines:[{y:0,color:COLORS.faint,dash:true}],series:[{label:'Residual Income vs Book Value Equity',color:COLORS.violet,pts}]}
    };
  }
},
{
  id:'pegratio',ch:2,year:1960,who:'Mario Farina (popularized: Peter Lynch)',name:'PEG Ratio',
  desc:'Menyesuaikan P/E ratio dengan growth rate — dipopulerkan Peter Lynch sebagai cara cepat menilai apakah saham growth "mahal" relatif terhadap kecepatan pertumbuhan earnings-nya, bukan cuma P/E mentah.',
  tex:'PEG=\\frac{P/E}{\\text{Growth Rate (\\%)}}',
  vars:[
    {k:'pe',label:'Price-to-Earnings (P/E)',min:5,max:80,step:1,def:25,unit:'x'},
    {k:'eps_growth',label:'EPS Growth Rate',min:1,max:50,step:1,def:15,unit:'%'}
  ],
  calc(v){
    const peg = v.pe/v.eps_growth;
    const pts = sweep(1,50,60,g=>v.pe/g);
    return {
      big:fmtNum(peg,2),bigUnit:'',bigLabel:'PEG Ratio',
      subs:[{l:'P/E Ratio',v:fmtNum(v.pe,1)+'x'},{l:'EPS Growth',v:fmtNum(v.eps_growth,1)+'%'}],
      note:{type: peg>2?'warn':peg<1?'good':'info', text: peg>2?'PEG >2: saham terlihat MAHAL relatif terhadap growth rate-nya menurut heuristik Lynch — pastikan growth rate yang dipakai realistis dan berkelanjutan.':peg<1?'PEG <1: secara heuristik klasik, saham ini terlihat UNDERVALUED relatif terhadap growth-nya — tapi tetap verifikasi kualitas earnings dan keberlanjutan growth rate.':'PEG mendekati 1: heuristik Lynch menganggap valuasi "fair" relatif terhadap growth — meski ini cuma rule of thumb, bukan model valuasi rigorous.'},
      chart:{xMin:1,xMax:50,yMin:0,yMax:Math.max(...pts.map(p=>p.y))*1.1,vline:v.eps_growth,hlines:[{y:1,color:COLORS.green,dash:true},{y:2,color:COLORS.red,dash:true}],series:[{label:'PEG vs EPS Growth',color:COLORS.cyan,pts}]}
    };
  }
},
{
  id:'sumofparts',ch:2,year:1980,who:'Praktik Investment Banking (Conglomerate Valuation)',name:'Sum-of-the-Parts (SOTP) Valuation',
  desc:'Menilai perusahaan dengan multi-segmen bisnis secara TERPISAH (masing-masing dengan multiple yang sesuai sektornya), lalu dijumlahkan — sering mengungkap "conglomerate discount" jika harga pasar lebih rendah dari SOTP.',
  tex:'EV_{total}=\\sum_i \\text{EBITDA}_i\\times \\text{Multiple}_i',
  vars:[
    {k:'seg1ebitda',label:'Segmen A — EBITDA',min:10,max:300,step:5,def:80,unit:'$M'},
    {k:'seg1mult',label:'Segmen A — Multiple',min:3,max:20,step:0.5,def:12,unit:'x'},
    {k:'seg2ebitda',label:'Segmen B — EBITDA',min:10,max:300,step:5,def:50,unit:'$M'},
    {k:'seg2mult',label:'Segmen B — Multiple',min:3,max:20,step:0.5,def:6,unit:'x'},
    {k:'currentmcap',label:'Market Cap Saat Ini',min:100,max:2000,step:25,def:900,unit:'$M'}
  ],
  calc(v){
    const ev1 = v.seg1ebitda*v.seg1mult;
    const ev2 = v.seg2ebitda*v.seg2mult;
    const sotpValue = ev1+ev2;
    const discount = (sotpValue-v.currentmcap)/sotpValue*100;
    const pts = sweep(100,2000,60,mc=>(sotpValue-mc)/sotpValue*100);
    return {
      big:fmtNum(sotpValue,1),bigUnit:'$M',bigLabel:'SOTP Enterprise Value',
      subs:[{l:'Segmen A Value',v:'$'+fmtNum(ev1,1)+'M'},{l:'Segmen B Value',v:'$'+fmtNum(ev2,1)+'M'},{l:'Conglomerate Discount',v:fmtNum(discount,1)+'%'}],
      note:{type: discount>20?'good':discount<0?'warn':'info', text: discount>20?'Conglomerate discount BESAR (>20%): pasar menghargai perusahaan jauh di bawah nilai SOTP — bisa jadi peluang value investing, atau ada alasan struktural (kompleksitas, governance) yang membuat diskon ini persisten.':discount<0?'Market cap saat ini LEBIH TINGGI dari estimasi SOTP — pasar mungkin memberikan premium untuk sinergi antar segmen, atau valuasi market sedang optimis berlebihan.':'Diskon konglomerat dalam rentang wajar yang umum ditemukan pada multi-segment companies.'},
      chart:{xMin:100,xMax:2000,yMin:Math.min(...pts.map(p=>p.y))-5,yMax:Math.max(...pts.map(p=>p.y))+5,vline:v.currentmcap,hlines:[{y:0,color:COLORS.faint,dash:true}],series:[{label:'Conglomerate Discount vs Market Cap',color:COLORS.amber,pts}]}
    };
  }
},
{
  id:'pricetobok',ch:2,year:1900,who:'Praktik Value Investing (Graham)',name:'Price-to-Book (P/B) Ratio',
  desc:'Membandingkan harga pasar saham dengan nilai buku akuntansinya per saham — fondasi screening value investing klasik ala Benjamin Graham, terutama relevan untuk sektor finansial (bank) dan asset-heavy industries.',
  tex:'P/B=\\frac{\\text{Price per Share}}{\\text{Book Value per Share}}',
  vars:[
    {k:'price2',label:'Harga Saham',min:5,max:200,step:1,def:45,unit:'$'},
    {k:'bvps',label:'Book Value per Share',min:5,max:150,step:1,def:30,unit:'$'},
    {k:'roe2',label:'ROE Perusahaan',min:1,max:30,step:0.5,def:12,unit:'%'}
  ],
  calc(v){
    const pb = v.price2/v.bvps;
    const pts = sweep(5,150,60,bvps=>v.price2/bvps);

      big:fmtNum(pb,2),bigUnit:'x',bigLabel:'Price-to-Book Ratio',
      subs:[{l:'Book Value per Share',v:'$'+fmtNum(v.bvps,2)},{l:'ROE Perusahaan',v:fmtNum(v.roe2,1)+'%'}],
      note:{type: pb<1?'good':pb>3&&v.roe2<10?'warn':'info', text: pb<1?'P/B <1x: saham diperdagangkan di BAWAH nilai buku akuntansinya — klasik sinyal value investing Graham, tapi verifikasi dulu apakah aset di balance sheet benar-benar bernilai sesuai bukunya (tidak ada hidden liabilities/impairment).':pb>3&&v.roe2<10?'P/B tinggi (>3x) TAPI ROE rendah (<10%): kombinasi yang tidak konsisten — pasar membayar premium tinggi untuk perusahaan yang returns-nya biasa saja, mungkin ada ekspektasi growth tinggi yang berisiko tidak terealisasi.':'P/B berada dalam rentang yang konsisten dengan profil profitabilitas (ROE) perusahaan.'},
      chart:{xMin:5,xMax:150,yMin:0,yMax:Math.max(...pts.map(p=>p.y))*1.1,vline:v.bvps,hlines:[{y:1,color:COLORS.green,dash:true}],series:[{label:'P/B vs Book Value per Share',color:COLORS.violet,pts}]}
    };
  }
},
{
  id:'evaformula',ch:2,year:1989,who:'Stern Stewart & Co.',name:'Economic Value Added (EVA)',
  desc:'Metrik kinerja korporat yang mengukur PROFIT EKONOMIS sesungguhnya — laba operasi setelah pajak (NOPAT) dikurangi biaya MODAL TOTAL (bukan cuma biaya utang) — dipopulerkan Stern Stewart sebagai alternatif metrik akuntansi tradisional.',
  tex:'EVA=NOPAT-(WACC\\times \\text{Invested Capital})',
  vars:[
    {k:'nopat',label:'NOPAT',min:20,max:400,step:5,def:120,unit:'$M'},
    {k:'wacc2',label:'WACC',min:4,max:18,step:0.25,def:9,unit:'%'},
    {k:'investedcap',label:'Invested Capital',min:200,max:3000,step:50,def:1200,unit:'$M'}
  ],
  calc(v){
    const capitalCharge = v.wacc2/100*v.investedcap;
    const eva = v.nopat-capitalCharge;
    const roic = v.nopat/v.investedcap*100;
    const pts = sweep(200,3000,60,ic=>v.nopat-(v.wacc2/100*ic));
    return {
      big:fmtNum(eva,2),bigUnit:'$M',bigLabel:'Economic Value Added',
      subs:[{l:'Capital Charge',v:'$'+fmtNum(capitalCharge,1)+'M'},{l:'ROIC',v:fmtNum(roic,2)+'%'},{l:'ROIC vs WACC',v:fmtNum(roic-v.wacc2,2)+'pp'}],
      note:{type: eva<0?'danger':eva/v.nopat<0.15?'warn':'good', text: eva<0?'EVA NEGATIF: perusahaan menghasilkan NOPAT positif secara akuntansi, tapi ROIC-nya LEBIH RENDAH dari WACC — secara ekonomis perusahaan ini menghancurkan nilai pemegang saham meski "untung" di laporan keuangan.':eva/v.nopat<0.15?'EVA positif tapi tipis relatif terhadap NOPAT: margin keamanan ekonomis terbatas, ROIC hanya sedikit di atas cost of capital.':'EVA kuat positif: ROIC jauh melampaui WACC — perusahaan menciptakan nilai ekonomis riil yang signifikan bagi pemegang sahamnya.'},
      chart:{xMin:200,xMax:3000,yMin:Math.min(...pts.map(p=>p.y))-10,yMax:Math.max(...pts.map(p=>p.y))+10,vline:v.investedcap,hlines:[{y:0,color:COLORS.faint,dash:true}],series:[{label:'EVA vs Invested Capital',color:COLORS.green,pts}]}
    };
  }
},
{
  id:'tobinsq',ch:2,year:1969,who:'James Tobin',name:"Tobin's Q",
  desc:'Rasio antara nilai pasar perusahaan dan biaya REPLACEMENT aset fisiknya — Q>1 mengindikasikan pasar menilai perusahaan lebih tinggi dari biaya membangun ulang asetnya dari nol (sering karena intangibles/brand/moat).',
  tex:"Q=\\frac{\\text{Market Value of Firm}}{\\text{Replacement Cost of Assets}}",
  vars:[
    {k:'mvf',label:'Market Value of Firm',min:50,max:1500,step:25,def:500,unit:'$M'},
    {k:'repcost',label:'Replacement Cost of Assets',min:50,max:1500,step:25,def:350,unit:'$M'}
  ],
